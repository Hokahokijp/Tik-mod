<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live Fix - Aa</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 280px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 240px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 85vh; }
        .hidden { display: none !important; }
        
        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            border: 3px solid #fff;
            box-shadow: 0 0 15px #00f6ff;
            pointer-events: none; 
        }
        
        input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
            <p style="font-size:12px">Belum punya akun? <a href="#" onclick="toggleAuth(true)">Daftar Akun</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h3>Daftar Baru</h3>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email Baru">
            <input type="password" id="r-pass" placeholder="Password Baru">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR SEKARANG</button>
            <p style="font-size:12px"><a href="#" onclick="toggleAuth(false)">Kembali Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px; border:none;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4>⚙️ Pengaturan Live</h4>
        <label style="font-size:11px">Username TikTok Aa:</label>
        <input type="text" id="userIn">
        <label style="font-size:11px">Target Gift:</label>
        <input type="text" id="giftTarget" value="Rose">
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="number" id="sizeIn" value="120" placeholder="Size">
            <input type="number" id="timeIn" value="15" placeholder="Detik">
        </div>
        <button onclick="konek()" style="background:#28a745; color:white;">MULAI BACA KOMENTAR</button>
        <button onclick="auth.signOut(); location.reload();" style="color:red; background:none; font-size:10px;">Keluar/Logout</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        // --- AUTH & DAFTAR (NURUT: BISA DAFTAR SEPUASNYA) ---
        function toggleAuth(s) { document.getElementById('login-form').classList.toggle('hidden', s); document.getElementById('register-form').classList.toggle('hidden', !s); }
        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            auth.createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/' + u.user.uid).set({ tiktokUser: t, email: e, status: 'free' });
                alert("Berhasil Daftar!"); toggleAuth(false);
            }).catch(a => alert(a.message));
        }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(a => alert("Gagal!")); }
        
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            } else { document.getElementById('auth-container').classList.remove('hidden'); }
        });

        // --- SISTEM SUARA (NURUT: WAJIB BACA KOMENTAR TANPA MACET) ---
        let speechQueue = [];
        let isSpeaking = false;
        function speak(text) {
            speechQueue.push(text);
            if (!isSpeaking) nextSpeech();
        }
        function nextSpeech() {
            if (speechQueue.length === 0) { isSpeaking = false; return; }
            isSpeaking = true;
            const ut = new SpeechSynthesisUtterance(speechQueue.shift());
            ut.lang = 'id-ID';
            ut.onend = () => { nextSpeech(); };
            window.speechSynthesis.speak(ut);
        }

        // --- SISTEM PROFIL (NURUT: DATANG MUNCUL, PERGI HILANG) ---
        let usersOnScreen = {};
        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function spawnProfile(id, url, config) {
            if (usersOnScreen[id]) return;
            const el = document.createElement('div');
            el.className = 'photo-el';
            el.style.backgroundImage = `url('${url}')`;
            const s = parseInt(config.size);
            el.style.width = s+'px'; el.style.height = s+'px';
            document.body.appendChild(el);
            usersOnScreen[id] = el;

            let px = Math.random() * (window.innerWidth - s), py = Math.random() * (window.innerHeight - s);
            let vx = (Math.random() - 0.5) * 6, vy = (Math.random() - 0.5) * 6;
            function move() {
                if (!usersOnScreen[id]) return;
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - s) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - s) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                requestAnimationFrame(move);
            }
            move();
        }

        function removeProfile(id) {
            if (usersOnScreen[id]) {
                usersOnScreen[id].remove();
                delete usersOnScreen[id];
            }
        }

        function konek() {
            const conf = { user: document.getElementById('userIn').value, size: document.getElementById('sizeIn').value };
            socket.emit('setTarget', conf);
            toggleMenu();
            speak("Sistem diaktifkan, siap membaca komentar.");
        }

        // --- EVENT TIKTOK REALTIME ---
        socket.on('chat', (data) => {
            if(data.comment) speak(data.nickname + " bilang " + data.comment);
        });

        socket.on('memberJoin', (data) => {
            spawnProfile(data.userId, data.url, data.config);
        });

        socket.on('memberLeave', (data) => {
            removeProfile(data.userId);
        });

        socket.on('gift', (data) => {
            speak(data.nickname + " kirim " + data.giftName);
        });
    </script>
</body>
</html>
