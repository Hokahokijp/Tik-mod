<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>TikTok Overlay Realtime</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #menu { position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hidden { display: none; }

        /* Bubble Style */
        .bubble-event {
            position: absolute; width: 70px; height: 70px; border-radius: 50%;
            border: 3px solid white; background-size: cover; background-position: center;
            animation: floatUp 4s linear forwards; pointer-events: none;
        }
        .heart-icon { position: absolute; bottom: -5px; right: -5px; font-size: 25px; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.1); opacity: 0; }
        }

        /* Kartu Cek Khodam/Jodoh */
        #card-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .kartu {
            background: rgba(0,0,0,0.85); border: 4px solid gold; border-radius: 15px;
            padding: 20px; width: 320px; text-align: center; color: white;
            display: none; box-shadow: 0 0 30px gold;
        }
    </style>
</head>
<body>

<div id="menu">
    <input type="text" id="target" placeholder="Username TikTok">
    <button onclick="mulai()">KONEK</button>
    <div id="log-status" style="font-size: 12px; margin-top: 5px; color: gray;">Siap.</div>
</div>

<div id="card-container">
    <div id="kartu" class="kartu">
        <div id="t_tipe" style="background:gold; color:black; font-weight:bold; border-radius:4px;">TIPE</div>
        <br><img id="t_foto" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid white;"><br>
        <div id="t_nama" style="font-size:18px; color:gold; margin:10px 0;">@user</div>
        <div id="t_hasil" style="font-size:22px; font-weight:bold; color:cyan;">HASILNYA</div>
    </div>
</div>

<script>
    const socket = io();

    function mulai() {
        const user = document.getElementById('target').value;
        if(!user) return alert("Isi username!");
        
        document.getElementById('log-status').innerText = "Menghubungkan...";
        socket.emit('setTarget', { user: user });
    }

    socket.on('status_konek', (res) => {
        document.getElementById('log-status').innerText = res.message;
        if(res.success) document.getElementById('menu').classList.add('hidden');
    });

    // Menangani Visual Join & Like
    socket.on('event_visual', (data) => {
        const el = document.createElement('div');
        el.className = 'bubble-event';
        el.style.backgroundImage = `url('${data.img}')`;
        el.style.left = (Math.random() * 85) + '%';
        
        if (data.type === 'like') {
            el.innerHTML = '<span class="heart-icon">❤️</span>';
            el.style.borderColor = '#ff4b4b';
        } else {
            el.style.borderColor = '#00fff2';
        }

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    });

    // Menangani Kartu Cek (Kado)
    socket.on('kartu_cek', (data) => {
        const k = document.getElementById('kartu');
        document.getElementById('t_tipe').innerText = data.tipe;
        document.getElementById('t_foto').src = data.img;
        document.getElementById('t_nama').innerText = data.user;
        document.getElementById('t_hasil').innerText = data.hasil;
        
        k.style.display = 'block';
        setTimeout(() => k.style.display = 'none', 7000);
    });
</script>
</body>
</html>
