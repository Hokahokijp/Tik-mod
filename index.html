<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Premium v2.2 - Leaderboard Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container, #pay-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 300px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 80vh; }
        .hidden { display: none !important; }
        
        /* CSS LEADERBOARD BINGKAI DI ATAS */
        #leaderboard-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 250px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slot {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid gold;
        }

        /* Posisi Bingkai sesuai gambar (1-6) */
        .slot[data-pos="1"] { top: 10px; width: 110px; height: 110px; z-index: 5; box-shadow: 0 0 30px #ff00ff; border-color: #ff00ff; }
        .slot[data-pos="2"] { top: 30px; left: calc(50% + 100px); border-color: #00ffff; }
        .slot[data-pos="3"] { top: 30px; left: calc(50% - 200px); border-color: #ff4500; }
        .slot[data-pos="4"] { top: 130px; left: calc(50% + 80px); width: 70px; height: 70px; border-color: #00ff00; }
        .slot[data-pos="5"] { top: 140px; width: 90px; height: 90px; border-color: #ffff00; }
        .slot[data-pos="6"] { top: 130px; left: calc(50% - 150px); width: 70px; height: 70px; border-color: #ff0000; }

        .slot .name-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            white-space: nowrap;
        }

        /* Foto Melayang di Bawah */
        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            pointer-events: none; 
            transition: opacity 0.5s; 
            z-index: 5;
            border: 4px solid white;
        }

        @keyframes fire-glow {
            0% { box-shadow: 0 0 20px #ff4500; border-color: #ff4500; }
            100% { box-shadow: 0 0 40px #ff0000; border-color: #ff0000; }
        }

        .nama-user-tiktok {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            white-space: nowrap;
        }

        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="leaderboard-container">
        <div id="s1" class="slot hidden" data-pos="1"><div class="name-label"></div></div>
        <div id="s2" class="slot hidden" data-pos="2"><div class="name-label"></div></div>
        <div id="s3" class="slot hidden" data-pos="3"><div class="name-label"></div></div>
        <div id="s4" class="slot hidden" data-pos="4"><div class="name-label"></div></div>
        <div id="s5" class="slot hidden" data-pos="5"><div class="name-label"></div></div>
        <div id="s6" class="slot hidden" data-pos="6"><div class="name-label"></div></div>
    </div>

    <div id="pay-modal" class="hidden">
        <div class="box">
            <h3 style="color:red; margin:0;">Limit Habis!</h3>
            <button class="btn-paket" onclick="beli('Satu Hari', '11.000')">Beli Paket</button>
            <button onclick="location.reload()">TUTUP</button>
        </div>
    </div>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4>⚙️ Pengaturan</h4>
        <input type="text" id="userIn" placeholder="Username TikTok">
        <select id="morphRose">
            <option value="none">Foto Profil Asli</option>
            <option value="https://cdn-icons-png.flaticon.com/512/3571/3571612.png"> Jadi Kodok</option>
        </select>
        <label>Ukuran Dasar:</label>
        <input type="range" id="sizeIn" min="40" max="150" value="70">
        <label>Lama Tampil (Detik):</label>
        <input type="number" id="timeIn" value="10">
        <button onclick="konek()" style="background:#007bff; color:white;">KONEK</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo", authDomain: "sos-pro-cd66d.firebaseapp.com", databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com", projectId: "sos-pro-cd66d", storageBucket: "sos-pro-cd66d.appspot.com", messagingSenderId: "879343847954", appId: "1:879343847954:web:cc0b959202055fc252e6cb" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        let topGifters = []; // Array untuk simpan data {uid, nickname, url, coins}
        let useCount = 0;
        let isPremium = false;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('btnT').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', snap => { if(snap.val().status === 'premium') isPremium = true; });
            }
        });

        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }
        function konek() { 
            const config = { user: document.getElementById('userIn').value, size: document.getElementById('sizeIn').value, time: document.getElementById('timeIn').value, morph: document.getElementById('morphRose').value };
            socket.emit('setTarget', config);
            toggleMenu();
        }

        // LOGIKA UPDATE LEADERBOARD BINGKAI
        function updateLeaderboard(newData) {
            if (!newData.diamondCount || newData.diamondCount <= 0) return;

            // 1. Cek apakah user sudah ada di list
            let index = topGifters.findIndex(g => g.nickname === newData.nickname);
            if (index > -1) {
                topGifters[index].coins += newData.diamondCount;
            } else {
                topGifters.push({ nickname: newData.nickname, url: newData.url, coins: newData.diamondCount });
            }

            // 2. Sortir berdasarkan koin terbanyak
            topGifters.sort((a, b) => b.coins - a.coins);

            // 3. Ambil Top 6 saja
            let currentTop6 = topGifters.slice(0, 6);

            // 4. Update Tampilan Visual Bingkai
            for (let i = 1; i <= 6; i++) {
                let slotEl = document.getElementById('s' + i);
                let data = currentTop6[i - 1];

                if (data) {
                    slotEl.style.backgroundImage = `url('${data.url}')`;
                    slotEl.querySelector('.name-label').innerText = data.nickname;
                    slotEl.classList.remove('hidden');
                    // Efek api jika nomor 1
                    if (i === 1) slotEl.style.animation = "fire-glow 0.5s infinite alternate";
                }
            }
        }

        function buatFotoMelayang(data) {
            if (!isPremium && useCount >= 15) { document.getElementById('pay-modal').classList.remove('hidden'); return; }
            useCount++;
            
            const el = document.createElement('div');
            el.className = 'photo-el';
            let imgUrl = (data.giftName === 'Rose' && data.config.morph !== 'none') ? data.config.morph : data.url;
            el.style.backgroundImage = `url('${imgUrl}')`;

            const labelNama = document.createElement('div');
            labelNama.className = 'nama-user-tiktok';
            labelNama.innerText = data.nickname;
            labelNama.style.color = "white";
            el.appendChild(labelNama);

            const baseSize = parseInt(data.config.size);
            el.style.width = baseSize + 'px'; el.style.height = baseSize + 'px';

            document.body.appendChild(el);
            
            let posX = Math.random() * (window.innerWidth - baseSize);
            let posY = window.innerHeight; // Mulai dari bawah
            let velX = (Math.random() - 0.5) * 5;
            let velY = -(Math.random() * 3 + 2); // Meluncur ke atas
            
            function move() {
                if (!el.parentElement) return;
                posX += velX; posY += velY;
                if (posX <= 0 || posX >= window.innerWidth - baseSize) velX *= -1;
                el.style.left = posX + 'px'; el.style.top = posY + 'px';
                requestAnimationFrame(move);
            }
            move();

            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, data.config.time * 1000);
        }

        socket.on('munculFoto', (data) => {
            buatFotoMelayang(data);
            if (data.diamondCount > 0) {
                updateLeaderboard(data);
            }
        });

        socket.on('memberJoin', (data) => { buatFotoMelayang(data); });
    </script>
</body>
</html>
