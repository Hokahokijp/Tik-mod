<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble & Square Photo Control</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f0f1a;
            overflow: hidden;
            font-family: sans-serif;
            position: fixed;
            width: 100%;
        }

        /* --- BINGKAI SESUAI GAMBAR (TOP 6) --- */
        #leaderboard-frame {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 250px;
            z-index: 100; /* Di atas segalanya */
            pointer-events: none;
        }

        .bingkai-slot {
            position: absolute;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* Posisi Koordinat Slot Sultan */
        .bingkai-slot[data-rank="1"] { top: 0; left: calc(50% - 55px); width: 110px; height: 110px; border-color: #ff00ff; }
        .bingkai-slot[data-rank="2"] { top: 30px; left: calc(50% + 80px); width: 85px; height: 85px; border-color: #00ffff; }
        .bingkai-slot[data-rank="3"] { top: 30px; left: calc(50% - 165px); width: 85px; height: 85px; border-color: #ff4500; }
        .bingkai-slot[data-rank="4"] { top: 130px; left: calc(50% + 70px); width: 75px; height: 75px; border-color: #00ff00; }
        .bingkai-slot[data-rank="5"] { top: 145px; left: calc(50% - 40px); width: 80px; height: 80px; border-color: #ffff00; }
        .bingkai-slot[data-rank="6"] { top: 130px; left: calc(50% - 145px); width: 75px; height: 75px; border-color: #ff0000; }

        /* GARIS PEMBATAS TENGAH */
        #mid-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, transparent);
            box-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }

        /* --- KODE ASLI ABANG (POTO MELAYANG) --- */
        #open-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: #00ffcc;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 2000;
        }

        #settings-panel {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 200px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .photo-el {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            pointer-events: none;
            left: 0;
            top: 0;
            z-index: 50; /* Di bawah bingkai */
            transition: border-radius 0.3s ease, opacity 0.5s ease;
        }

        .hidden { display: none !important; }
        h3 { margin: 0 0 10px 0; font-size: 13px; color: #00ffcc; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }
        label { font-size: 11px; display: block; margin-bottom: 4px; color: #bbb; }
        input[type="range"], select { width: 100%; margin-bottom: 12px; background: #333; color: white; border: none; padding: 5px; border-radius: 4px; }
        .btn-hide { width: 100%; padding: 8px; background: #ff4d4d; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mid-line"></div>

    <div id="leaderboard-frame">
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="1"></div>
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="2"></div>
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="3"></div>
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="4"></div>
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="5"></div>
        <div id="https://i.ibb.co.com/Xr60g95B/download-5.jpg" class="bingkai-slot" data-rank="6"></div>
    </div>

    <button id="open-btn" onclick="togglePanel(true)">⚙️</button>

    <div id="settings-panel">
        <h3>⚙️ PENGATURAN</h3>
        <label>Bentuk Foto</label>
        <select id="shapeCtrl">
            <option value="50%">Bulat (Bubble)</option>
            <option value="0%">Kotak (Persegi)</option>
            <option value="20px">Rounded</option>
        </select>
        <label>Ukuran</label>
        <input type="range" id="sizeCtrl" min="40" max="180" value="80">
        <label>Kecepatan Gerak</label>
        <input type="range" id="speedCtrl" min="0" max="10" value="3">
        <label>Waktu Hilang (Detik)</label>
        <input type="range" id="timerCtrl" min="1" max="20" value="10">
        <span id="timerVal" style="font-size: 10px; display: block; margin-top: -10px; margin-bottom: 10px; text-align: right;">10s</span>
        <button class="btn-hide" onclick="togglePanel(false)">Tutup Pengaturan</button>
    </div>

    <script>
        let photos = [];
        const panel = document.getElementById('settings-panel');
        const openBtn = document.getElementById('open-btn');
        const timerCtrl = document.getElementById('timerCtrl');
        const timerVal = document.getElementById('timerVal');

        function togglePanel(show) {
            panel.style.display = show ? 'block' : 'none';
            openBtn.style.display = show ? 'none' : 'block';
        }

        timerCtrl.oninput = () => { timerVal.innerText = timerCtrl.value + "s"; };

        function createPhoto() {
            const id = Date.now() + Math.random();
            const size = parseInt(document.getElementById('sizeCtrl').value);
            
            // Spawn hanya di area atas (0 sampai 50% layar)
            const p = {
                id: id,
                el: document.createElement('div'),
                x: Math.random() * (window.innerWidth - size),
                y: Math.random() * (window.innerHeight * 0.4), // Muncul di atas
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2,
                spawnTime: Date.now()
            };

            p.el.className = 'photo-el';
            // Gunakan placeholder profil jika aslinya kosong
            p.el.style.backgroundImage = `url('https://picsum.photos/200?random=${id}')`;
            document.body.appendChild(p.el);
            photos.push(p);
        }

        // Interval dipercepat agar terlihat ramai
        setInterval(() => {
            if (photos.length < 15) createPhoto();
        }, 1500);

        function animate() {
            const size = parseInt(document.getElementById('sizeCtrl').value);
            const speed = parseFloat(document.getElementById('speedCtrl').value);
            const shape = document.getElementById('shapeCtrl').value;
            const lifeSpan = parseInt(timerCtrl.value) * 1000;

            const winW = window.innerWidth;
            const winH_Mid = window.innerHeight / 2; // BATAS GARIS TENGAH
            const now = Date.now();

            for (let i = photos.length - 1; i >= 0; i--) {
                let p = photos[i];

                if (now - p.spawnTime > lifeSpan) {
                    p.el.style.opacity = '0';
                    setTimeout(() => { if (p.el.parentNode) p.el.remove(); }, 500);
                    photos.splice(i, 1);
                    continue;
                }

                p.el.style.width = size + 'px';
                p.el.style.height = size + 'px';
                p.el.style.borderRadius = shape;

                p.x += p.dx * speed;
                p.y += p.dy * speed;

                // --- PANTULAN DENGAN BATAS GARIS TENGAH ---
                if (p.x + size > winW) { p.x = winW - size; p.dx *= -1; }
                else if (p.x < 0) { p.x = 0; p.dx *= -1; }

                // Batas Atas (0) dan Batas Bawah (Garis Tengah)
                if (p.y + size > winH_Mid) { p.y = winH_Mid - size; p.dy *= -1; }
                else if (p.y < 0) { p.y = 0; p.dy *= -1; }

                p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
            }
            requestAnimationFrame(animate);
        }

        for(let i=0; i<5; i++) createPhoto();
        animate();
    </script>
</body>
</html>
