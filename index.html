<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Balap TikTok 7 Player</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0; height: 100vh; background: #0f0f1a;
            overflow: hidden; font-family: 'Arial Black', sans-serif;
            color: white;
        }

        /* LINTASAN ATAS */
        #race-track {
            position: absolute; top: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, #222, #111);
            border-bottom: 4px solid #ff00cc;
        }

        /* AREA JOIN BAWAH */
        #join-area {
            position: absolute; top: 50%; width: 100%; height: 50%;
            background: #0a0a12;
        }

        /* STATUS GAME */
        #game-status {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; text-align: center; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 15px; border: 2px solid #00ffcc;
        }

        .racer {
            position: absolute; width: 80px; height: 80px;
            border-radius: 50%; background-size: cover;
            border: 4px solid gold; box-shadow: 0 0 15px gold;
            z-index: 200; transition: transform 0.1s linear;
        }

        .name-tag {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            background: black; font-size: 10px; padding: 2px 5px; white-space: nowrap;
        }

        .floating {
            position: absolute; border-radius: 50%; background-size: cover;
            border: 2px solid white; opacity: 0.7; z-index: 50;
        }

        #finish-line {
            position: absolute; right: 50px; top: 0; width: 10px; height: 100%;
            background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px);
        }
    </style>
</head>
<body>

    <div id="race-track">
        <div id="finish-line"></div>
        <div id="racers-container"></div>
    </div>
    
    <div id="join-area"></div>

    <div id="game-status">
        <div id="msg">MENUNGGU PEMBALAP...</div>
        <div id="count" style="font-size: 40px; color: #ff00cc;">0/7</div>
    </div>

    <script>
        const socket = io();
        let raceActive = false;
        let pendaftar = []; // Antrian 7 orang
        let spectators = [];
        let finishers = 0;

        // 1. KONEKSI TANPA REFRESH
        socket.on('connect', () => {
            console.log("Sistem Aktif & Terhubung!");
            document.getElementById('msg').innerText = "MENUNGGU 7 PEMBALAP...";
        });

        // 2. LOGIKA GIFT (MASUK BALAPAN)
        socket.on('munculFoto', (data) => {
            if (raceActive) return; // Kalau sudah mulai, tunggu match depan

            // Cek apakah user sudah daftar
            if (!pendaftar.find(u => u.id === data.uniqueId)) {
                if (pendaftar.length < 7) {
                    pendaftar.push({
                        id: data.uniqueId,
                        name: data.nickname,
                        url: data.url,
                        speed: 1 + (data.diamondCount * 0.5),
                        x: 0,
                        y: 30 + (pendaftar.length * 40),
                        el: null,
                        finished: false
                    });
                    
                    updateStatus();
                    
                    if (pendaftar.length === 7) {
                        startCountdown();
                    }
                }
            } else {
                // Jika sudah ada dalam antrian dan nge-gift lagi, tambah speed
                let user = pendaftar.find(u => u.id === data.uniqueId);
                user.speed += (data.diamondCount * 0.5);
            }
        });

        function updateStatus() {
            document.getElementById('count').innerText = `${pendaftar.length}/7`;
        }

        function startCountdown() {
            let timeLeft = 10;
            const timer = setInterval(() => {
                document.getElementById('msg').innerText = "BALAPAN DIMULAI DALAM";
                document.getElementById('count').innerText = timeLeft;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    runRace();
                }
            }, 1000);
        }

        function runRace() {
            document.getElementById('game-status').style.display = 'none';
            raceActive = true;
            
            pendaftar.forEach(p => {
                const div = document.createElement('div');
                div.className = 'racer';
                div.style.backgroundImage = `url('${p.url}')`;
                div.innerHTML = `<div class="name-tag">${p.name}</div>`;
                document.getElementById('racers-container').appendChild(div);
                p.el = div;
            });
        }

        // 3. LOGIKA JOIN/CHAT (HANYA MELAYANG DI BAWAH)
        socket.on('memberJoin', (data) => spawnSpectator(data));
        socket.on('chat', (data) => spawnSpectator(data));

        function spawnSpectator(data) {
            const size = 50;
            const s = {
                el: document.createElement('div'),
                x: Math.random() * (window.innerWidth - size),
                y: (window.innerHeight * 0.55) + (Math.random() * (window.innerHeight * 0.35)),
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2
            };
            s.el.className = 'floating';
            s.el.style.width = size + 'px';
            s.el.style.height = size + 'px';
            s.el.style.backgroundImage = `url('${data.profilePictureUrl || data.url}')`;
            document.getElementById('join-area').appendChild(s.el);
            spectators.push(s);
            setTimeout(() => { s.el.remove(); spectators.splice(spectators.indexOf(s), 1); }, 8000);
        }

        // 4. LOOP ANIMASI UTAMA
        function update() {
            if (raceActive) {
                const finishLineX = window.innerWidth - 130;
                
                pendaftar.forEach(p => {
                    if (!p.finished) {
                        p.x += p.speed * 0.5;
                        if (p.x >= finishLineX) {
                            p.x = finishLineX;
                            p.finished = true;
                            finishers++;
                        }
                    }
                    p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
                });

                if (finishers === 7) {
                    resetRace();
                }
            }

            spectators.forEach(s => {
                s.x += s.dx; s.y += s.dy;
                if (s.x < 0 || s.x > window.innerWidth - 50) s.dx *= -1;
                if (s.y < window.innerHeight * 0.5 || s.y > window.innerHeight - 50) s.dy *= -1;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px)`;
            });

            requestAnimationFrame(update);
        }

        function resetRace() {
            setTimeout(() => {
                raceActive = false;
                finishers = 0;
                pendaftar = [];
                document.getElementById('racers-container').innerHTML = '';
                document.getElementById('game-status').style.display = 'block';
                document.getElementById('msg').innerText = "MENUNGGU 7 PEMBALAP...";
                updateStatus();
            }, 5000); // Tunggu 5 detik baru reset untuk match baru
        }

        update();
    </script>
</body>
</html>
