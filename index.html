<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Premium v2.2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container, #pay-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 300px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 80vh; }
        .hidden { display: none !important; }
        
        /* CSS FOTO MELAYANG */
        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            pointer-events: none; 
            transition: opacity 0.5s, width 0.3s, height 0.3s; 
            z-index: 50;
            border: 4px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        @keyframes neon-rotate {
            0% { filter: hue-rotate(0deg); box-shadow: 0 0 10px #00fff2; }
            50% { box-shadow: 0 0 20px #ff00ff; }
            100% { filter: hue-rotate(360deg); box-shadow: 0 0 10px #00fff2; }
        }

        @keyframes mega-glow {
            0% { transform: scale(1); box-shadow: 0 0 25px gold; border-color: gold; }
            50% { transform: scale(1.1); box-shadow: 0 0 50px #ff4500; border-color: #ff4500; }
            100% { transform: scale(1); box-shadow: 0 0 25px gold; border-color: gold; }
        }

        @keyframes gift-glow {
            0% { box-shadow: 0 0 15px #ff0055; border-color: #ff0055; }
            50% { box-shadow: 0 0 35px #ff0055; border-color: #fff; }
            100% { box-shadow: 0 0 15px #ff0055; border-color: #ff0055; }
        }

        .nama-user-tiktok {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 2px 2px 4px #000;
            white-space: nowrap;
            z-index: 999;
        }

        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; font-size: 13px; }
        label { font-size: 11px; font-weight: bold; margin-top: 8px; display: block; color: #555; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="pay-modal" class="hidden">
        <div class="box">
            <h3 style="color:red; margin:0;">Limit Habis!</h3>
            <button onclick="beli('Selamanya', '18.900')" style="background:#6f42c1; color:white;">Beli Paket Selamanya</button>
            <button onclick="location.reload()" style="background:#eee; color:black; font-size:10px;">TUTUP</button>
        </div>
    </div>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
            <p style="font-size:12px">Belum punya akun? <a href="#" onclick="showReg()">Daftar</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h3>Daftar Baru</h3>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email">
            <input type="password" id="r-pass" placeholder="Password">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR</button>
            <p style="font-size:12px"><a href="#" onclick="showLogin()">Balik Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px; border:none;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4 style="margin:0 0 10px 0">⚙️ Pengaturan</h4>
        <label>Username TikTok Target:</label>
        <input type="text" id="userIn" placeholder="Contoh: hoka_hoki">
        <label>Ukuran Dasar (Pixel):</label>
        <input type="range" id="sizeIn" min="40" max="200" value="80">
        <div class="switch-box">
            <span>🔊 TTS</span>
            <input type="checkbox" id="ttsOn" checked>
        </div>
        <button onclick="konek()" style="background:#007bff; color:white;">KONEK SEKARANG</button>
        <button onclick="auth.signOut(); location.reload();" style="font-size:10px;">Logout</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo", authDomain: "sos-pro-cd66d.firebaseapp.com", databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com", projectId: "sos-pro-cd66d", storageBucket: "sos-pro-cd66d.appspot.com", messagingSenderId: "879343847954", appId: "1:879343847954:web:cc0b959202055fc252e6cb" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        let useCount = 0, isPremium = false;
        const activeUsers = {}; // DAFTAR USER DI LAYAR

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val();
                    if (!data) return;
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    document.getElementById('userIn').value = data.tiktokUser;
                    if(data.status?.toLowerCase() === 'premium') isPremium = true;
                });
            } else { document.getElementById('auth-container').classList.remove('hidden'); }
        });

        function login() { auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(e => alert(e.message)); }
        function showReg() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
        function showLogin() { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }
        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function speak(text) {
            if (!document.getElementById('ttsOn').checked) return;
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'id-ID';
            window.speechSynthesis.speak(ut);
        }

        function konek() {
            const config = { user: document.getElementById('userIn').value, size: document.getElementById('sizeIn').value };
            socket.emit('setTarget', config);
            toggleMenu();
            speak("Menghubungkan ke " + config.user);
        }

        // --- LOGIKA UTAMA TAMPILAN ---

        socket.on('munculFoto', (data) => handleUserDisplay(data));
        socket.on('userJoin', (data) => handleUserDisplay(data));

        function handleUserDisplay(data) {
            const userId = data.userId || data.nickname;

            // PERBAIKAN: Jika user sudah ada, hanya update animasi (jangan buat elemen baru)
            if (activeUsers[userId]) {
                updateAnimation(activeUsers[userId], data);
                if (data.giftName) speak(`${data.nickname} kasih ${data.giftName}`);
                return;
            }

            if (!isPremium && useCount >= 50) { document.getElementById('pay-modal').classList.remove('hidden'); return; }
            useCount++;

            // Buat element baru
            const el = document.createElement('div');
            el.className = 'photo-el';
            el.id = 'user-' + userId;
            el.style.backgroundImage = `url('${data.url}')`;

            const labelNama = document.createElement('div');
            labelNama.className = 'nama-user-tiktok';
            labelNama.innerText = data.nickname || "User";
            const warnaWarni = ['#FF0000', '#00FF00', '#00FFFF', '#FFFF00', '#FF00FF', '#FFFFFF'];
            labelNama.style.color = warnaWarni[Math.floor(Math.random() * warnaWarni.length)];
            el.appendChild(labelNama);

            updateAnimation(el, data);
            document.body.appendChild(el);
            activeUsers[userId] = el;

            startFloating(el, parseInt(data.config.size));
            if (data.giftName) speak(`${data.nickname} kasih ${data.giftName}`);
        }

        socket.on('userLeave', (data) => {
            const el = document.getElementById('user-' + data.userId);
            if (el) {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.remove();
                    delete activeUsers[data.userId];
                }, 500);
            }
        });

        function updateAnimation(el, data) {
            const sizeNum = parseInt(data.config.size);
            if (data.diamondCount >= 100) {
                el.style.width = (sizeNum + 40) + 'px'; 
                el.style.height = (sizeNum + 40) + 'px';
                el.style.animation = "mega-glow 0.8s infinite ease-in-out";
                el.style.border = "6px solid gold";
            } else if (data.diamondCount >= 1) {
                el.style.width = sizeNum + 'px'; el.style.height = sizeNum + 'px';
                el.style.animation = "gift-glow 1s infinite";
                el.style.border = "4px solid #ff0055";
            } else {
                el.style.width = sizeNum + 'px'; el.style.height = sizeNum + 'px';
                el.style.animation = "neon-rotate 3s infinite linear";
                el.style.border = "3px solid white";
            }
        }

        function startFloating(el, size) {
            let posX = Math.random() * (window.innerWidth - size);
            let posY = Math.random() * (window.innerHeight - size);
            let velX = (Math.random() - 0.5) * 4;
            let velY = (Math.random() - 0.5) * 4;

            function move() {
                if (!el.parentElement) return;
                posX += velX; posY += velY;
                if (posX <= 0 || posX >= window.innerWidth - size) velX *= -1;
                if (posY <= 0 || posY >= window.innerHeight - size) velY *= -1;
                el.style.left = posX + 'px'; el.style.top = posY + 'px';
                requestAnimationFrame(move);
            }
            move();
        }

        socket.on('chat', (data) => { speak(`${data.nickname} bilang: ${data.comment}`); });
    </script>
</body>
</html>
