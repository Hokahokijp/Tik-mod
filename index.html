<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay PRO v2.8</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 280px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 240px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 85vh; }
        .hidden { display: none !important; }
        
        @keyframes petir {
            0% { box-shadow: 0 0 10px #fff, 0 0 20px #00d4ff; border: 3px solid #fff; }
            50% { box-shadow: 0 0 25px #00d4ff, 0 0 40px #007bff; border: 3px solid #00d4ff; }
            100% { box-shadow: 0 0 10px #fff, 0 0 20px #00d4ff; border: 3px solid #fff; }
        }

        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            pointer-events: none; 
            animation: petir 0.4s infinite alternate;
        }
        
        input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
        .switch-box { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-top: 10px; background: #f0f0f0; padding: 8px; border-radius: 5px; }
        .checklist-group { text-align: left; background: #f9f9f9; padding: 8px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
            <p style="font-size:12px">Belum punya akun? <a href="#" onclick="toggleAuth(true)">Daftar</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h3>Daftar Akun</h3>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email Baru">
            <input type="password" id="r-pass" placeholder="Password Baru">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR</button>
            <p style="font-size:12px"><a href="#" onclick="toggleAuth(false)">Kembali Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4 style="margin:0">⚙️ Pengaturan</h4>
        <label>TikTok Target:</label>
        <input type="text" id="userIn">
        <label>Target Gift:</label>
        <input type="text" id="giftTarget" value="Rose">
        <label>Ubah Wujud (Ceklis):</label>
        <div class="checklist-group">
            <label style="font-weight:normal"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/3571/3571612.png"> 🐸 Kodok</label>
            <label style="font-weight:normal"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/whq7Qv3z/download-removebg-preview.png"> 🐷 Babi</label>
            <label style="font-weight:normal"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/616/616408.png"> 🐱 Kucing</label>
        </div>
        <label>Ukuran & Detik:</label>
        <div style="display:flex; gap:5px;">
            <input type="number" id="sizeIn" value="120">
            <input type="number" id="timeIn" value="8">
        </div>
        <div class="switch-box">
            <span>🔊 Suara Komentar</span>
            <input type="checkbox" id="ttsOn" checked>
        </div>
        <button onclick="konek()" style="background:#28a745; color:white;">MULAI LIVE</button>
        <button onclick="auth.signOut(); location.reload();" style="color:red; background:none; font-size:10px;">LOGOUT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        function toggleAuth(s) {
            document.getElementById('login-form').classList.toggle('hidden', s);
            document.getElementById('register-form').classList.toggle('hidden', !s);
        }

        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            auth.createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/' + u.user.uid).set({ tiktokUser: t, email: e, status: 'free' });
                alert("Berhasil! Silakan Login."); toggleAuth(false);
            }).catch(a => alert(a.message));
        }

        function login() {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(a => alert("Gagal!"));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
            }
        });

        // --- FUNGSI SUARA GOOGLE ---
        function speak(msg) {
            if (!document.getElementById('ttsOn').checked) return;
            const synth = window.speechSynthesis;
            synth.cancel();
            const talk = new SpeechSynthesisUtterance(msg);
            talk.lang = 'id-ID';
            talk.rate = 1.1;
            synth.speak(talk);
        }

        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function konek() {
            const morphs = [];
            document.querySelectorAll('.m-check:checked').forEach(c => morphs.push(c.value));
            const config = {
                user: document.getElementById('userIn').value,
                size: document.getElementById('sizeIn').value,
                time: document.getElementById('timeIn').value,
                giftName: document.getElementById('giftTarget').value,
                morphs: morphs
            };
            socket.emit('setTarget', config);
            toggleMenu();
            speak("Menghubungkan. Suara komentar aktif.");
        }

        // --- LOGIKA MUNCUL FOTO (GIFT, TAP-TAP, DLL) ---
        function createPhoto(url, nickname, isGift, giftName, config) {
            const el = document.createElement('div');
            el.className = 'photo-el';
            
            let img = url;
            // Jika Gift target, ubah wujud
            if (isGift && giftName.toLowerCase() === config.giftName.toLowerCase()) {
                if (config.morphs.length > 0) img = config.morphs[Math.floor(Math.random() * config.morphs.length)];
            }
            
            el.style.backgroundImage = `url('${img}')`;
            const s = parseInt(config.size);
            el.style.width = s + 'px'; el.style.height = s + 'px';
            document.body.appendChild(el);

            // Pergerakan Memantul
            let px = Math.random() * (window.innerWidth - s), py = Math.random() * (window.innerHeight - s);
            let vx = (Math.random() - 0.5) * 12, vy = (Math.random() - 0.5) * 12;
            
            function move() {
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - s) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - s) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                if (el.parentNode) requestAnimationFrame(move);
            }
            move();
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, config.time * 1000);
        }

        socket.on('munculFoto', (data) => {
            createPhoto(data.url, data.nickname, !!data.giftName, data.giftName || "", data.config);
            if (data.giftName) speak(data.nickname + " kasih " + data.giftName);
        });

        // --- BACA KOMENTAR ---
        socket.on('chat', (data) => {
            if(data.comment) {
                speak(data.nickname + " bilang " + data.comment);
            }
        });

        // --- TAP-TAP (LIKE) ---
        socket.on('like', (data) => {
            createPhoto(data.url, data.nickname, false, "", data.config);
        });
    </script>
</body>
</html>
