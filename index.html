<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERLAY AA FIX</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 8888; background: white; padding: 15px; border-radius: 10px; width: 220px; }
        .hidden { display: none !important; }

        /* ANIMASI */
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(255,0,0,0); } 100% { transform: scale(1); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rgb { 0% { border-color: red; filter: drop-shadow(0 0 15px red); } 33% { border-color: lime; filter: drop-shadow(0 0 25px lime); } 66% { border-color: blue; filter: drop-shadow(0 0 15px blue); } 100% { border-color: red; filter: drop-shadow(0 0 15px red); } }

        .user-photo {
            position: absolute;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            z-index: 50;
            background: #222;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div style="text-align:center">
            <h3>MASUK LIVE AA</h3>
            <input type="email" id="l-email" placeholder="Email" style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="password" id="l-pass" placeholder="Password" style="width:100%; padding:8px; margin-bottom:10px;">
            <button onclick="login()" style="width:100%; padding:10px; background:blue; color:white; border:none;">MASUK</button>
            <p onclick="toggleReg(true)" style="cursor:pointer; font-size:12px; margin-top:10px;">Daftar Akun Baru</p>
        </div>
    </div>

    <div id="reg-container" class="hidden" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; color:white;">
        <div style="text-align:center">
            <h3>DAFTAR AKUN</h3>
            <input type="text" id="r-tiktok" placeholder="User TikTok" style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="email" id="r-email" placeholder="Email" style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="password" id="r-pass" placeholder="Password" style="width:100%; padding:8px; margin-bottom:10px;">
            <button onclick="register()" style="width:100%; padding:10px; background:green; color:white; border:none;">DAFTAR</button>
            <p onclick="toggleReg(false)" style="cursor:pointer; font-size:12px; margin-top:10px;">Kembali Login</p>
        </div>
    </div>

    <div id="menu" class="hidden">
        <label>TikTok Username:</label>
        <input type="text" id="userIn" style="width:100%; margin-bottom:10px;">
        <button onclick="konek()" style="width:100%; background:red; color:white; border:none; padding:10px;">START LIVE</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        let photos = {};

        function toggleReg(s) { 
            document.getElementById('auth-container').classList.toggle('hidden', s);
            document.getElementById('reg-container').classList.toggle('hidden', !s);
        }

        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            auth.createUserWithEmailAndPassword(e, p).then(u => { db.ref('users/' + u.user.uid).set({ tiktokUser: t }); location.reload(); }).catch(err => alert(err.message));
        }

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(err => alert("Gagal!"));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('reg-container').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', snap => { if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser; });
            }
        });

        function addPhoto(data) {
            if (photos[data.userId]) { photos[data.userId].remove(); }

            const img = document.createElement('img');
            img.src = data.url;
            img.className = 'user-photo';
            img.crossOrigin = "anonymous"; 
            
            let size = 80;
            let coin = data.coins || 0;

            if (coin >= 100) { size = 200; img.style.animation = "rgb 1s infinite linear"; }
            else if (coin >= 30) { size = 150; img.style.borderColor = "gold"; img.style.animation = "rotate 4s infinite linear"; }
            else if (coin >= 1) { size = 100; img.style.borderColor = "red"; img.style.animation = "pulse 2s infinite"; }

            img.style.width = size + 'px';
            img.style.height = size + 'px';
            document.body.appendChild(img);
            photos[data.userId] = img;

            let x = Math.random() * (window.innerWidth - size), y = Math.random() * (window.innerHeight - size);
            let dx = (Math.random() - 0.5) * 5, dy = (Math.random() - 0.5) * 5;

            function run() {
                if (!photos[data.userId]) return;
                x += dx; y += dy;
                if (x <= 0 || x >= window.innerWidth - size) dx *= -1;
                if (y <= 0 || y >= window.innerHeight - size) dy *= -1;
                img.style.left = x + 'px'; img.style.top = y + 'px';
                requestAnimationFrame(run);
            }
            run();
        }

        socket.on('memberJoin', data => addPhoto(data));
        socket.on('gift', data => addPhoto(data));
        socket.on('memberLeave', data => { if(photos[data.userId]) { photos[data.userId].remove(); delete photos[data.userId]; } });

        function konek() {
            socket.emit('setTarget', { user: document.getElementById('userIn').value });
            document.getElementById('menu').classList.add('hidden');
        }
    </script>
</body>
</html>
