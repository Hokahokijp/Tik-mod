<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay TikFinity Style</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 25px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; width: 250px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); overflow-y: auto; max-height: 90vh; }
        .hidden { display: none !important; }
        
        /* Animasi Petir Premium */
        @keyframes thunder {
            0% { box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #00e5ff; border: 3px solid #fff; transform: scale(1); }
            50% { box-shadow: 0 0 20px #00e5ff, 0 0 50px #00e5ff, 0 0 70px #007bff; border: 3px solid #00e5ff; transform: scale(1.05); }
            100% { box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #00e5ff; border: 3px solid #fff; transform: scale(1); }
        }

        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            pointer-events: none; 
            animation: thunder 0.5s infinite;
            z-index: 10;
        }
        
        input { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        button { cursor: pointer; border-radius: 8px; border: none; padding: 12px; font-weight: bold; width: 100%; margin-top: 12px; transition: 0.3s; }
        .switch-box { display: flex; align-items: center; justify-content: space-between; font-size: 13px; margin-top: 12px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .checklist-group { text-align: left; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-top: 5px; }
        .check-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .check-item input { width: auto; margin-right: 10px; margin-top: 0; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h2 style="margin-top:0">Masuk Akun</h2>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK SEKARANG</button>
            <p style="font-size:13px">Belum ada akun? <a href="#" onclick="toggleAuth(true)">Daftar Akun</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h2>Daftar Baru</h2>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email Baru">
            <input type="password" id="r-pass" placeholder="Password Baru">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR SEKARANG</button>
            <p style="font-size:13px"><a href="#" onclick="toggleAuth(false)">Kembali Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:15px; left:15px; z-index:101; width:50px; height:50px; border-radius:50%; background:white; border:none; box-shadow:0 4px 15px rgba(0,0,0,0.2); font-size:24px;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h3 style="margin:0 0 15px 0; border-bottom:2px solid #eee; padding-bottom:10px;">Pengaturan Live</h3>
        <label style="font-size:12px; font-weight:bold;">Username TikTok Target:</label>
        <input type="text" id="userIn">
        
        <label style="font-size:12px; font-weight:bold; margin-top:10px; display:block;">Target Gift Khusus:</label>
        <input type="text" id="giftTarget" value="Rose">
        
        <label style="font-size:12px; font-weight:bold; margin-top:10px; display:block;">Ubah Wujud (Gift):</label>
        <div class="checklist-group">
            <div class="check-item"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/3571/3571612.png"> 🐸 Jadi Kodok</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/whq7Qv3z/download-removebg-preview.png"> 🐷 Jadi Babi</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/616/616408.png"> 🐱 Jadi Kucing</div>
        </div>

        <label style="font-size:12px; font-weight:bold; margin-top:10px; display:block;">Ukuran & Waktu Tampil:</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="sizeIn" value="150" placeholder="Size">
            <input type="number" id="timeIn" value="10" placeholder="Detik">
        </div>

        <div class="switch-box">
            <span>🔊 Google TTS (Suara)</span>
            <input type="checkbox" id="ttsOn" checked style="width:auto">
        </div>

        <button onclick="konek()" style="background:#007bff; color:white;">TERAPKAN & MULAI</button>
        <button onclick="auth.signOut(); location.reload();" style="background:none; color:red; border:1px solid red; font-size:11px;">KELUAR / LOGOUT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        // --- LOGIKA DAFTAR & LOGIN ---
        function toggleAuth(reg) {
            document.getElementById('login-form').classList.toggle('hidden', reg);
            document.getElementById('register-form').classList.toggle('hidden', !reg);
        }
        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            if(!t || !e || !p) return alert("Isi semua bidang!");
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                db.ref('users/' + res.user.uid).set({ tiktokUser: t, email: e, status: 'free' });
                alert("Berhasil Daftar!"); toggleAuth(false);
            }).catch(err => alert(err.message));
        }
        function login() {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Gagal Login!"));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
            }
        });

        // --- LOGIKA SUARA ANTREAN (STYLE TIKFINITY) ---
        let speechQueue = [];
        let isSpeaking = false;

        function speak(text) {
            if (!document.getElementById('ttsOn').checked) return;
            speechQueue.push(text);
            processQueue();
        }

        function processQueue() {
            if (isSpeaking || speechQueue.length === 0) return;
            isSpeaking = true;
            const msg = new SpeechSynthesisUtterance(speechQueue.shift());
            msg.lang = 'id-ID';
            msg.rate = 1.0;
            msg.onend = () => {
                isSpeaking = false;
                processQueue();
            };
            window.speechSynthesis.speak(msg);
        }

        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function konek() {
            const morphs = [];
            document.querySelectorAll('.m-check:checked').forEach(c => morphs.push(c.value));
            const config = {
                user: document.getElementById('userIn').value,
                size: document.getElementById('sizeIn').value,
                time: document.getElementById('timeIn').value,
                giftName: document.getElementById('giftTarget').value,
                morphs: morphs
            };
            socket.emit('setTarget', config);
            toggleMenu();
            speak("Sistem diaktifkan. Menunggu interaksi live.");
        }

        // --- LOGIKA TAMPILAN FOTO ---
        function showProfile(url, nickname, isGift, giftName, config) {
            const el = document.createElement('div');
            el.className = 'photo-el';
            let img = url;
            if (isGift && giftName.toLowerCase() === config.giftName.toLowerCase()) {
                if (config.morphs.length > 0) img = config.morphs[Math.floor(Math.random() * config.morphs.length)];
            }
            el.style.backgroundImage = `url('${img}')`;
            const s = parseInt(config.size);
            el.style.width = s + 'px'; el.style.height = s + 'px';
            document.body.appendChild(el);

            let px = Math.random() * (window.innerWidth - s), py = Math.random() * (window.innerHeight - s);
            let vx = (Math.random() - 0.5) * 10, vy = (Math.random() - 0.5) * 10;
            function move() {
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - s) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - s) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                if (el.parentNode) requestAnimationFrame(move);
            }
            move();
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, config.time * 1000);
        }

        // Event Socket
        socket.on('munculFoto', (data) => {
            showProfile(data.url, data.nickname, !!data.giftName, data.giftName || "", data.config);
            if (data.giftName) speak(`${data.nickname} mengirim gift ${data.giftName}`);
        });

        socket.on('chat', (data) => {
            if (data.comment) speak(`${data.nickname} berkata ${data.comment}`);
        });

        socket.on('like', (data) => {
            showProfile(data.url, data.nickname, false, "", data.config);
        });
    </script>
</body>
</html>
