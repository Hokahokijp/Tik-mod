<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Premium v2.5 GACOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container, #pay-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 300px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 80vh; }
        .hidden { display: none !important; }
        
        .photo-el { 
            position: absolute; background-size: cover; background-position: center; border-radius: 50%; 
            pointer-events: none; transition: opacity 0.5s; z-index: 50; border: 4px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5); animation: neon-rotate 3s infinite linear;
        }

        .medali {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-size: 40px; z-index: 1000; animation: bounceMedali 1s infinite;
        }

        @keyframes bounceMedali { 0%, 100% { top: -35px; } 50% { top: -45px; } }
        @keyframes neon-rotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .nama-user-tiktok {
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
            font-weight: bold; font-size: 14px; text-shadow: 2px 2px 4px #000;
            white-space: nowrap; z-index: 999; color: #FFFFFF;
        }

        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="pay-modal" class="hidden"><div class="box"><h3 style="color:red;">Limit Habis!</h3><button onclick="beli('Satu Hari', '11.000')">Paket 1 Hari</button><button onclick="location.reload()">TUTUP</button></div></div>
    <div id="auth-container"><div class="box" id="login-form"><h3>Masuk Akun</h3><input type="email" id="l-email" placeholder="Email"><input type="password" id="l-pass" placeholder="Password"><button onclick="login()" style="background:#007bff; color:white;">MASUK</button></div></div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4>⚙️ Pengaturan</h4>
        <input type="text" id="userIn" placeholder="Username TikTok">
        <label>Rose Jadi:</label>
        <select id="morphRose">
            <option value="none">Asli</option>
            <option value="https://cdn-icons-png.flaticon.com/512/3571/3571612.png">Kodok</option>
            <option value="https://i.ibb.co.com/whq7Qv3z/download-removebg-preview.png">Buaya</option>
        </select>
        <label>Ukuran:</label>
        <input type="range" id="sizeIn" min="40" max="250" value="100">
        <button onclick="konek()" style="background:#007bff; color:white;">KONEK GACOR</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let activeProfiles = {}; 
        let userDiamonds = {};
        let speechQueue = [];
        let isSpeaking = false;

        // --- TTS SYSTEM ---
        function speak(text) {
            speechQueue.push(text);
            if (!isSpeaking) processQueue();
        }
        function processQueue() {
            if (speechQueue.length === 0) { isSpeaking = false; return; }
            isSpeaking = true;
            const ut = new SpeechSynthesisUtterance(speechQueue.shift());
            ut.lang = 'id-ID';
            ut.onend = () => processQueue();
            window.speechSynthesis.speak(ut);
        }

        // --- FIREBASE CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo", databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- CORE FUNCTIONS ---
        function spawnProfile(data, silent = false) {
            if (activeProfiles[data.uniqueId]) {
                if (data.diamondCount) {
                    userDiamonds[data.uniqueId] = (userDiamonds[data.uniqueId] || 0) + parseInt(data.diamondCount);
                    updateLeaderboard();
                }
                return;
            }

            const el = document.createElement('div');
            el.className = 'photo-el';
            let imgUrl = data.profilePictureUrl || data.url;
            if (data.giftName === 'Rose' && document.getElementById('morphRose').value !== 'none') imgUrl = document.getElementById('morphRose').value;
            
            el.style.backgroundImage = `url('${imgUrl}')`;
            const size = document.getElementById('sizeIn').value + 'px';
            el.style.width = size; el.style.height = size;

            const label = document.createElement('div');
            label.className = 'nama-user-tiktok';
            label.innerText = data.nickname || data.uniqueId;
            el.appendChild(label);

            document.body.appendChild(el);
            activeProfiles[data.uniqueId] = el;
            userDiamonds[data.uniqueId] = data.diamondCount || 0;

            if(!silent) speak(`${label.innerText} gabung`);
            
            // Logic Gerak
            let px = Math.random() * window.innerWidth, py = Math.random() * window.innerHeight;
            let vx = (Math.random()-0.5)*4, vy = (Math.random()-0.5)*4;
            function move() {
                if(!el.parentElement) return;
                px += vx; py += vy;
                if(px<0 || px>window.innerWidth-100) vx*=-1;
                if(py<0 || py>window.innerHeight-100) vy*=-1;
                el.style.left = px+'px'; el.style.top = py+'px';
                requestAnimationFrame(move);
            }
            move();
            updateLeaderboard();
        }

        function updateLeaderboard() {
            let sorted = Object.keys(userDiamonds).sort((a,b) => userDiamonds[b]-userDiamonds[a]);
            document.querySelectorAll('.medali').forEach(m => m.remove());
            sorted.slice(0,3).forEach((id, i) => {
                if(userDiamonds[id] > 0 && activeProfiles[id]) {
                    const m = document.createElement('div');
                    m.className = 'medali';
                    m.innerText = i==0?'🥇':i==1?'🥈':'🥉';
                    activeProfiles[id].appendChild(m);
                }
            });
        }

        // --- SOCKET LISTENERS (BRUTAL MODE) ---
        socket.on('memberJoin', d => spawnProfile(d, false));
        socket.on('chat', d => { spawnProfile(d, true); speak(`${d.nickname}: ${d.comment}`); });
        socket.on('munculFoto', d => { spawnProfile(d, true); if(d.giftName) speak(`${d.nickname} kasih ${d.giftName}`); });
        socket.on('activity', d => { spawnProfile(d, true); if(d.type !== 'like') speak(`${d.nickname} ${d.type}`); });
        socket.on('memberLeave', d => {
            if(activeProfiles[d.uniqueId]) {
                activeProfiles[d.uniqueId].remove();
                delete activeProfiles[d.uniqueId];
                delete userDiamonds[d.uniqueId];
                updateLeaderboard();
            }
        });

        // --- AUTO RECONNECT ON REFRESH ---
        socket.on('connect', () => {
            const last = document.getElementById('userIn').value;
            if(last) socket.emit('setTarget', { user: last });
        });

        function konek() {
            const u = document.getElementById('userIn').value;
            document.querySelectorAll('.photo-el').forEach(e => e.remove());
            activeProfiles = {}; userDiamonds = {};
            socket.emit('setTarget', { user: u });
            toggleMenu();
        }

        function login() { auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value); }
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('auth-container').classList.add('hidden'); document.getElementById('btnT').classList.remove('hidden'); } });
        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }
    </script>
</body>
</html>
