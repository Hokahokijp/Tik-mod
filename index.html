<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Khodam TikTok Live</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #setup { position: fixed; top: 10px; left: 10px; background: white; padding: 15px; border-radius: 10px; z-index: 999; }
        
        /* Tampilan Hasil Cek */
        #display-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; text-align: center;
        }

        .card-result {
            background: rgba(0, 0, 0, 0.85);
            border: 5px solid #ff0055;
            padding: 30px; border-radius: 20px;
            color: white; width: 80%; max-width: 600px;
            box-shadow: 0 0 50px #ff0055;
            display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .user-name { color: #00fff2; font-size: 24px; margin-bottom: 10px; }
        .tipe-cek { background: #ff0055; padding: 5px 15px; border-radius: 50px; font-size: 18px; }
        .pesan-hasil { font-size: 32px; margin-top: 20px; line-height: 1.2; }
        .detail-badge { color: gold; font-size: 14px; display: block; margin-top: 10px; border: 1px solid gold; padding: 2px; }
    </style>
</head>
<body>

    <div id="setup">
        <input type="text" id="targetUser" placeholder="Username TikTok Kamu">
        <button onclick="startKonek()">MULAI CEK</button>
        <p id="status" style="font-size: 12px; color: gray;">Belum Terhubung</p>
    </div>

    <div id="display-container">
        <div id="resultCard" class="card-result">
            <div class="tipe-cek" id="resTipe">TIPE CEK</div>
            <div class="user-name" id="resUser">NAMA USER</div>
            <div class="pesan-hasil" id="resPesan">HASIL RAMALAN DISINI</div>
            <div id="resBadge" class="detail-badge" style="display:none;">PREMIUM DETAIL ✔️</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const card = document.getElementById('resultCard');

        function startKonek() {
            const user = document.getElementById('targetUser').value;
            socket.emit('setTarget', { user: user });
        }

        socket.on('status', (msg) => {
            document.getElementById('status').innerText = msg;
        });

        socket.on('showResult', (data) => {
            // Isi data ke layar
            document.getElementById('resTipe').innerText = data.tipe;
            document.getElementById('resUser').innerText = data.user;
            document.getElementById('resPesan').innerText = data.pesan;
            
            if(data.detail) {
                document.getElementById('resBadge').style.display = 'block';
                card.style.borderColor = 'gold';
                card.style.boxShadow = '0 0 50px gold';
            } else {
                document.getElementById('resBadge').style.display = 'none';
                card.style.borderColor = '#ff0055';
                card.style.boxShadow = '0 0 50px #ff0055';
            }

            // Tampilkan Card
            card.style.display = 'block';

            // Bersuara Google
            const ut = new SpeechSynthesisUtterance(`${data.user}, hasil ${data.tipe} kamu adalah: ${data.pesan}`);
            ut.lang = 'id-ID';
            window.speechSynthesis.speak(ut);

            // Hilang otomatis setelah 10 detik
            setTimeout(() => { card.style.display = 'none'; }, 10000);
        });
    </script>
</body>
</html>
