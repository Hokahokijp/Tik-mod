<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Cek Khodam</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 300px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }

        /* TAMPILAN KARTU CEK KHODAM */
        #display-cek {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;
        }
        .kartu {
            background: rgba(0, 0, 0, 0.9); border: 5px solid gold; border-radius: 25px;
            padding: 40px; width: 450px; text-align: center; color: white;
            box-shadow: 0 0 50px gold; display: none; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .u-foto { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; margin-bottom: 20px; }
        .u-tipe { background: gold; color: black; font-weight: bold; padding: 5px 20px; border-radius: 50px; font-size: 20px; display: inline-block; }
        .u-hasil { font-size: 35px; margin-top: 25px; color: #00fff2; text-shadow: 0 0 10px #00fff2; line-height: 1.2; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white; border:none; padding:10px; width:100%; border-radius:5px; margin-top:10px;">MASUK</button>
        </div>
    </div>

    <div id="menu" class="hidden">
        <h4 style="margin:0 0 10px 0">⚙️ Pengaturan</h4>
        <input type="text" id="userIn" placeholder="Username TikTok" style="width:100%; padding:8px; box-sizing:border-box;">
        <button onclick="konek()" style="background:#007bff; color:white; width:100%; padding:10px; border:none; border-radius:5px; margin-top:10px;">KONEK LIVE</button>
    </div>

    <div id="display-cek">
        <div id="kartuCek" class="kartu">
            <div id="resTipe" class="u-tipe">TIPE CEK</div>
            <br><br>
            <img id="resFoto" src="" class="u-foto">
            <div id="resNama" style="font-size:20px; color:gold;">@username</div>
            <div id="resHasil" class="u-hasil">HASIL RAMALAN</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // CONFIG FIREBASE ASLI MILIKMU - TIDAK DIUBAH
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const socket = io();

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value)
            .then(() => {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
            }).catch(err => alert("Gagal Login!"));
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'id-ID';
            window.speechSynthesis.speak(ut);
        }

        socket.on('hasilCekKartu', (data) => {
            const kartu = document.getElementById('kartuCek');
            document.getElementById('resTipe').innerText = data.tipe;
            document.getElementById('resFoto').src = data.url;
            document.getElementById('resNama').innerText = data.nickname;
            document.getElementById('resHasil').innerText = data.hasil;

            kartu.style.display = 'block';
            speak(`${data.nickname}, hasil ${data.tipe} kamu adalah ${data.hasil}`);

            setTimeout(() => { kartu.style.display = 'none'; }, 10000);
        });

        socket.on('chat', (data) => {
            speak(`${data.nickname} bilang ${data.comment}`);
        });

        function konek() {
            socket.emit('setTarget', { user: document.getElementById('userIn').value });
        }
    </script>
</body>
</html>
