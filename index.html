<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Overlay HP Style</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; width: 100vw; height: 100vh; }
        
        /* SLIDER GIFT (TOP 3) - Pas buat layar HP */
        #slider-container {
            position: fixed; top: 10px; right: 10px; width: 220px;
            display: flex; flex-direction: column; gap: 5px; z-index: 800;
        }
        .slider-item {
            display: flex; align-items: center; background: rgba(0,0,0,0.8);
            border: 2px solid gold; border-radius: 30px; padding: 5px 10px;
            color: white; animation: slideIn 0.5s ease;
        }
        .slider-item img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid white; margin-right: 8px; }
        .slider-info { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* BUBBLE MELAYANG ACAK */
        .bubble-event {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid white; background-size: cover;
            animation: floatRandom 5s linear forwards; z-index: 10;
        }
        .heart-icon { position: absolute; bottom: -5px; right: -5px; font-size: 20px; }

        @keyframes floatRandom {
            0% { transform: translate(0, 100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(var(--moveX), -10vh) scale(1.2); opacity: 0; }
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* KARTU TENGAH */
        #card-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; padding: 20px; }
        .kartu {
            background: rgba(0,0,0,0.9); border: 4px solid gold; border-radius: 15px;
            padding: 20px; width: 100%; max-width: 320px; text-align: center; color: white;
            box-shadow: 0 0 20px gold; display: none; animation: zoom 0.4s ease-out;
        }
        @keyframes zoom { from { transform: scale(0.5); } to { transform: scale(1); } }

        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; display: flex; align-items: center; justify-content: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 500; background: white; padding: 10px; border-radius: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="slider-container"></div>

<div id="auth-container">
    <div style="background:white; padding:20px; border-radius:10px; text-align:center; width:80%;">
        <h3>Login</h3>
        <input type="email" id="email" placeholder="Email" style="width:90%; padding:8px; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="width:90%; padding:8px; margin-bottom:10px;">
        <button onclick="doLogin()" style="width:100%; padding:10px; background:gold; border:none;">MASUK</button>
    </div>
</div>

<div id="menu" class="hidden">
    <input type="text" id="target" placeholder="User TikTok" style="width:100px;">
    <button onclick="mulai()">KONEK</button>
</div>

<div id="card-container">
    <div id="kartu" class="kartu">
        <div id="t_tipe" style="background:gold; color:black; font-weight:bold; padding:3px; border-radius:5px; font-size:12px;">TIPE</div><br>
        <img id="t_foto" src="" style="width:80px; border-radius:50%; border:2px solid white;"><br>
        <div id="t_nama" style="font-size:16px; color:gold; margin:5px 0;">@user</div>
        <div id="t_hasil" style="font-size:22px; font-weight:bold; color:#00fff2;">HASILNYA</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo", databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const socket = io();

    function doLogin() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
        .then(() => { document.getElementById('auth-container').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); });
    }

    // --- SISTEM SUARA ---
    let antreanSuara = []; let sedangNgomong = false;
    function bicara(teks) {
        antreanSuara.push(teks);
        if (!sedangNgomong) prosesAntrean();
    }
    function prosesAntrean() {
        if (antreanSuara.length === 0) { sedangNgomong = false; return; }
        sedangNgomong = true;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(antreanSuara.shift());
        msg.lang = 'id-ID'; msg.onend = () => prosesAntrean();
        window.speechSynthesis.speak(msg);
    }

    // --- SLIDER LOGIC ---
    let topGifts = [];
    function updateSlider(data) {
        let userIdx = topGifts.findIndex(g => g.user === data.user);
        if (userIdx !== -1) { topGifts[userIdx].diamonds += data.diamonds; }
        else { topGifts.push({ user: data.user, img: data.img, diamonds: data.diamonds }); }
        
        topGifts.sort((a, b) => b.diamonds - a.diamonds);
        topGifts = topGifts.slice(0, 3);

        const container = document.getElementById('slider-container');
        container.innerHTML = '';
        topGifts.forEach((g, i) => {
            container.innerHTML += `
                <div class="slider-item">
                    <span style="color:gold; font-weight:bold; margin-right:5px;">#${i+1}</span>
                    <img src="${g.img}">
                    <div class="slider-info"><b>${g.user}</b><br>💰 ${g.diamonds}</div>
                </div>`;
        });
    }

    // --- VISUAL HANDLERS ---
    socket.on('event_visual', (data) => {
        const el = document.createElement('div');
        el.className = 'bubble-event';
        el.style.backgroundImage = `url('${data.img}')`;
        el.style.left = (Math.random() * 70 + 10) + '%';
        // Kasih variabel random biar melayangnya acak ke kiri/kanan
        el.style.setProperty('--moveX', (Math.random() * 200 - 100) + 'px');
        
        if (data.type === 'like') {
            el.innerHTML = '<span class="heart-icon">❤️</span>';
            el.style.borderColor = 'red';
        }
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    });

    socket.on('chat_masuk', (data) => bicara(`${data.user} bilang ${data.text}`));

    socket.on('kartu_cek', (data) => {
        if (data.diamonds > 0) updateSlider(data);
        
        document.getElementById('t_tipe').innerText = data.tipe;
        document.getElementById('t_foto').src = data.img;
        document.getElementById('t_nama').innerText = data.user;
        document.getElementById('t_hasil').innerText = data.hasil;
        const k = document.getElementById('kartu');
        k.style.display = 'block';
        bicara(`${data.user}, ${data.hasil}`);
        setTimeout(() => k.style.display = 'none', 8000);
    });

    function mulai() {
        socket.emit('setTarget', { user: document.getElementById('target').value });
        document.getElementById('menu').classList.add('hidden');
        bicara("Sistem aktif.");
    }
</script>
</body>
</html>
