<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Premium v4.5 - Aa</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; transition: 0.5s; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        #menu { position: fixed; top: 15px; left: 15px; z-index: 1000; background: white; padding: 20px; border-radius: 15px; width: 250px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); overflow-y: auto; max-height: 85vh; }
        .hidden { display: none !important; }

        /* KEYFRAMES ANIMASI PREMIUM */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
        @keyframes spin-gold { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rgb-sultan { 
            0% { border-color: red; box-shadow: 0 0 20px red; } 
            33% { border-color: lime; box-shadow: 0 0 40px lime; } 
            66% { border-color: blue; box-shadow: 0 0 20px blue; } 
            100% { border-color: red; box-shadow: 0 0 20px red; } 
        }
        @keyframes tap-pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            border: 3px solid white; 
            pointer-events: none; 
            z-index: 10;
            transition: opacity 0.5s, width 0.3s, height 0.3s;
        }

        input, select { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; }
        button { cursor: pointer; border-radius: 8px; border: none; padding: 12px; font-weight: bold; width: 100%; margin-top: 15px; background: #007bff; color: white; }
    </style>
</head>
<body id="bg-body">

    <div id="auth-container">
        <div class="box" id="login-form">
            <h2>Masuk</h2>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()">MASUK</button>
            <p style="font-size:12px">Baru? <a href="#" onclick="toggleAuth(true)">Daftar</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h2>Daftar</h2>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email">
            <input type="password" id="r-pass" placeholder="Password">
            <button onclick="register()" style="background:#28a745;">DAFTAR</button>
            <p style="font-size:12px"><a href="#" onclick="toggleAuth(false)">Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:15px; left:15px; z-index:1001; width:50px; height:50px; border-radius:50%; background:white; font-size:24px; border:none;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h3>Pengaturan</h3>
        <label style="font-size:12px">Tema Latar:</label>
        <select id="bgSelect" onchange="changeBG(this.value)">
            <option value="#000">Hitam Polos</option>
            <option value="url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=800')">Galaxy</option>
            <option value="url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=800')">Neon Cyber</option>
            <option value="url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800')">Abstract</option>
            <option value="url('https://images.unsplash.com/photo-1502691876148-a84978f5d88b?w=800')">Lava</option>
            <option value="linear-gradient(45deg, #0f0c29, #302b63, #24243e)">Deep Purple</option>
        </select>

        <label style="font-size:12px">Username TikTok:</label>
        <input type="text" id="userIn">

        <label style="font-size:12px">Ukuran Dasar:</label>
        <input type="range" id="sizeIn" min="40" max="150" value="75">

        <button onclick="konek()">MULAI SEKARANG</button>
        <button onclick="auth.signOut(); location.reload();" style="background:none; color:red; font-size:10px;">Logout</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        let usersOnScreen = {};

        function changeBG(v) { document.getElementById('bg-body').style.background = v; document.getElementById('bg-body').style.backgroundSize = "cover"; }
        function toggleAuth(s) { document.getElementById('login-form').classList.toggle('hidden', s); document.getElementById('register-form').classList.toggle('hidden', !s); }
        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            auth.createUserWithEmailAndPassword(e, p).then(u => { db.ref('users/' + u.user.uid).set({ tiktokUser: t, email: e }); }).catch(a => alert(a.message));
        }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(() => alert("Gagal!")); }
        
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            }
        });

        function createPhoto(data) {
            const id = data.userId;
            // Jika user sudah ada, hapus dulu biar bersih
            if (usersOnScreen[id]) {
                usersOnScreen[id].remove();
                delete usersOnScreen[id];
            }

            const el = document.createElement('div');
            el.className = 'photo-el';
            el.id = "u-" + id; // Konsisten pakai ID ini
            
            let baseSize = parseInt(document.getElementById('sizeIn').value);
            let coin = data.coins || 0;

            // LOGIKA ANIMASI KOIN
            if (coin >= 100) { 
                el.style.width = (baseSize * 2.5) + 'px';
                el.style.height = (baseSize * 2.5) + 'px';
                el.style.animation = "rgb-sultan 1.5s infinite linear";
                el.style.borderWidth = "5px";
            } else if (coin >= 30) {
                el.style.width = (baseSize * 1.8) + 'px';
                el.style.height = (baseSize * 1.8) + 'px';
                el.style.borderColor = "gold";
                el.style.boxShadow = "0 0 20px gold";
                el.style.animation = "spin-gold 4s infinite linear";
            } else if (coin >= 1) {
                el.style.width = (baseSize + 15) + 'px';
                el.style.height = (baseSize + 15) + 'px';
                el.style.borderColor = "#ff4d4d";
                el.style.animation = "pulse-red 2s infinite";
            } else {
                el.style.width = baseSize + 'px';
                el.style.height = baseSize + 'px';
            }

            el.style.backgroundImage = `url('${data.url}')`;
            document.body.appendChild(el);
            usersOnScreen[id] = el;

            // Gerakan Pantul
            let px = Math.random() * (window.innerWidth - 100), py = Math.random() * (window.innerHeight - 100);
            let vx = (Math.random() - 0.5) * 6, vy = (Math.random() - 0.5) * 6;
            
            function move() {
                if (!usersOnScreen[id]) return;
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - el.offsetWidth) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - el.offsetHeight) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                requestAnimationFrame(move);
            }
            move();
        }

        // SOCKET HANDLERS
        socket.on('memberJoin', (data) => createPhoto(data));
        socket.on('gift', (data) => createPhoto(data));
        
        socket.on('like', (data) => {
            const el = document.getElementById("u-" + data.userId);
            if (el) { 
                el.style.animation = "tap-pop 0.3s ease"; 
                setTimeout(() => {
                    // Balikin animasi koinnya kalau dia sultan/gift
                    if(data.coins >= 100) el.style.animation = "rgb-sultan 1.5s infinite linear";
                    else if(data.coins >= 30) el.style.animation = "spin-gold 4s infinite linear";
                    else if(data.coins >= 1) el.style.animation = "pulse-red 2s infinite";
                    else el.style.animation = "";
                }, 300);
            }
        });

        socket.on('chat', (data) => {
            const el = document.getElementById("u-" + data.userId);
            if (el) { el.style.boxShadow = "0 0 35px white"; setTimeout(() => el.style.boxShadow = "", 800); }
        });

        socket.on('memberLeave', (data) => {
            if(usersOnScreen[data.userId]) {
                usersOnScreen[data.userId].remove();
                delete usersOnScreen[data.userId];
            }
        });

        function konek() {
            const target = document.getElementById('userIn').value;
            if(!target) return alert("Isi Username TikTok dulu!");
            socket.emit('setTarget', { user: target });
            toggleMenu();
            console.log("Koneksi dimulai ke: " + target);
        }
    </script>
</body>
</html>
