<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live - Stay & Leave System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0; height: 100vh; background: #050510;
            overflow: hidden; font-family: 'Arial Black', sans-serif; color: white;
        }

        /* --- AREA BINGKAI BALAP (ATAS) --- */
        #race-track {
            position: absolute; top: 0; width: 100%; height: 50%;
            background: rgba(255,255,255,0.02); border-bottom: 3px solid #00ffcc;
        }

        .slot-container {
            position: absolute; width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
        }

        /* GAMBAR BINGKAI DARI LINK ABANG */
        .frame-image {
            position: absolute; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co.com/Xr60g95B/download-5.jpg');
            background-size: contain; background-repeat: no-repeat;
            z-index: 10;
        }

        .user-photo {
            width: 70%; height: 70%; border-radius: 50%;
            background-size: cover; background-position: center;
            z-index: 5;
        }

        .id-name {
            position: absolute; bottom: -15px; font-size: 10px;
            color: #00ffcc; white-space: nowrap; font-weight: bold;
        }

        /* POSISI SLOT JALUR */
        .slot-1 { top: 10px; left: 20px; }
        .slot-2 { top: 100px; left: 20px; }
        .slot-3 { top: 190px; left: 20px; }

        /* --- AREA MELAYANG (BAWAH) --- */
        #audience-area {
            position: absolute; top: 50%; width: 100%; height: 50%;
        }

        .floating-user {
            position: absolute; border: 2px solid #fff; border-radius: 50%;
            background-size: cover; z-index: 50; transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="race-track">
        <div id="lane-1" class="slot-container slot-1" style="display:none;">
            <div class="frame-image"></div>
            <div id="img-1" class="user-photo"></div>
            <div id="name-1" class="id-name"></div>
        </div>
        <div id="lane-2" class="slot-container slot-2" style="display:none;">
            <div class="frame-image"></div>
            <div id="img-2" class="user-photo"></div>
            <div id="name-2" class="id-name"></div>
        </div>
        <div id="lane-3" class="slot-container slot-3" style="display:none;">
            <div class="frame-image"></div>
            <div id="img-3" class="user-photo"></div>
            <div id="name-3" class="id-name"></div>
        </div>
    </div>

    <div id="audience-area"></div>

    <script>
        const socket = io();
        let activeUsers = {}; // Simpan data user yang lagi di room
        let racers = []; // Data pemain di bingkai atas

        // 1. KETIKA JOIN ROOM -> TAMPIL FOTO
        socket.on('memberJoin', (data) => {
            if (!activeUsers[data.uniqueId]) {
                const el = document.createElement('div');
                el.className = 'floating-user';
                el.style.width = '60px'; el.style.height = '60px';
                el.style.backgroundImage = `url('${data.profilePictureUrl}')`;
                
                // Posisi awal acak di area bawah
                const x = Math.random() * (window.innerWidth - 60);
                const y = (window.innerHeight * 0.55) + (Math.random() * (window.innerHeight * 0.3));
                
                document.getElementById('audience-area').appendChild(el);
                
                activeUsers[data.uniqueId] = {
                    el: el,
                    x: x, y: y,
                    dx: (Math.random() - 0.5) * 2,
                    dy: (Math.random() - 0.5) * 2
                };
            }
        });

        // 2. KETIKA LEAVE ROOM -> HAPUS FOTO
        socket.on('memberLeave', (data) => {
            if (activeUsers[data.uniqueId]) {
                activeUsers[data.uniqueId].el.remove();
                delete activeUsers[data.uniqueId];
            }
            // Jika dia ada di bingkai balap, kosongkan juga
            const racerIdx = racers.findIndex(r => r.id === data.uniqueId);
            if (racerIdx !== -1) {
                const laneNum = racerIdx + 1;
                document.getElementById('lane-' + laneNum).style.display = 'none';
                racers.splice(racerIdx, 1);
            }
        });

        // 3. JIKA GIFT -> MASUK BINGKAI & BALAP
        socket.on('munculFoto', (data) => {
            let p = racers.find(x => x.id === data.uniqueId);
            if (!p && racers.length < 3) {
                const laneNum = racers.length + 1;
                const container = document.getElementById('lane-' + laneNum);
                document.getElementById('img-' + laneNum).style.backgroundImage = `url('${data.url}')`;
                document.getElementById('name-' + laneNum).innerText = data.uniqueId;
                container.style.display = 'flex';
                
                p = { id: data.uniqueId, lane: container, x: 20, speed: data.diamondCount * 2 };
                racers.push(p);
            } else if (p) {
                p.speed += data.diamondCount * 2;
            }
        });

        // ANIMASI GERAKAN
        function animate() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;

            // Gerakan penonton di bawah (Stay selama di room)
            for (let id in activeUsers) {
                let u = activeUsers[id];
                u.x += u.dx; u.y += u.dy;
                if (u.x < 0 || u.x > winW - 60) u.dx *= -1;
                if (u.y < winH * 0.5 || u.y > winH - 60) u.dy *= -1;
                u.el.style.transform = `translate(${u.x}px, ${u.y}px)`;
            }

            // Gerakan balap di atas
            racers.forEach(p => {
                p.x += p.speed * 0.05;
                if (p.x > winW) p.x = -100;
                if (p.speed > 0.5) p.speed *= 0.99;
                p.lane.style.transform = `translateX(${p.x}px)`;
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
