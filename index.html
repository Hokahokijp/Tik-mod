<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Live Reader PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 280px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 240px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 85vh; }
        .hidden { display: none !important; }
        
        /* Animasi Glow Petir */
        @keyframes petirAnim {
            0% { box-shadow: 0 0 10px #fff, 0 0 20px #00f6ff; border: 3px solid #fff; }
            50% { box-shadow: 0 0 20px #00f6ff, 0 0 40px #007bff; border: 3px solid #00f6ff; }
            100% { box-shadow: 0 0 10px #fff, 0 0 20px #00f6ff; border: 3px solid #fff; }
        }

        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border-radius: 50%; 
            pointer-events: none; 
            animation: petirAnim 0.4s infinite alternate;
        }
        
        input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        .switch-box { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-top: 10px; background: #f0f0f0; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
            <p style="font-size:12px">Belum ada akun? <a href="#" onclick="toggleAuth(true)">Daftar</a></p>
        </div>
        <div class="box hidden" id="register-form">
            <h3>Daftar Baru</h3>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email Baru">
            <input type="password" id="r-pass" placeholder="Password Baru">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR</button>
            <p style="font-size:12px"><a href="#" onclick="toggleAuth(false)">Kembali Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px; border:none; box-shadow:0 0 10px rgba(0,0,0,0.2);" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4 style="margin:0 0 10px 0">⚙️ Live Control</h4>
        <label style="font-size:11px">Username TikTok Aa:</label>
        <input type="text" id="userIn" placeholder="@username">
        
        <label style="font-size:11px; margin-top:10px; display:block;">Target Gift (Wujud Kodok):</label>
        <input type="text" id="giftTarget" value="Rose">
        
        <div style="display:flex; gap:5px; margin-top:10px;">
            <div>
                <label style="font-size:10px">Ukuran</label>
                <input type="number" id="sizeIn" value="120">
            </div>
            <div>
                <label style="font-size:10px">Lama (Detik)</label>
                <input type="number" id="timeIn" value="10">
            </div>
        </div>

        <div class="switch-box">
            <span>🔊 Bacakan Komentar</span>
            <input type="checkbox" id="ttsOn" checked>
        </div>

        <button onclick="konek()" style="background:#28a745; color:white;">HUBUNGKAN LIVE</button>
        <button onclick="auth.signOut(); location.reload();" style="color:red; background:none; font-size:10px;">Logout</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Konfigurasi Firebase Aa
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        // --- AUTH SYSTEM ---
        function toggleAuth(s) { document.getElementById('login-form').classList.toggle('hidden', s); document.getElementById('register-form').classList.toggle('hidden', !s); }
        function register() {
            const t = document.getElementById('r-tiktok').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            auth.createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/' + u.user.uid).set({ tiktokUser: t, email: e, status: 'free' });
                alert("Berhasil Daftar!"); toggleAuth(false);
            }).catch(a => alert(a.message));
        }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value).catch(a => alert("Login Gagal!")); }
        
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            } else { document.getElementById('auth-container').classList.remove('hidden'); }
        });

        // --- SISTEM SUARA (ANTREAN TIKFINITY STYLE) ---
        let speechQueue = [];
        let isSpeaking = false;

        function speak(msg) {
            if (!document.getElementById('ttsOn').checked) return;
            speechQueue.push(msg);
            if (!isSpeaking) processQueue();
        }

        function processQueue() {
            if (speechQueue.length === 0) { isSpeaking = false; return; }
            isSpeaking = true;
            const synth = window.speechSynthesis;
            const ut = new SpeechSynthesisUtterance(speechQueue.shift());
            ut.lang = 'id-ID';
            ut.rate = 1.0;
            ut.onend = () => { processQueue(); };
            synth.speak(ut);
        }

        // --- SISTEM FOTO PROFIL ---
        let activeUsers = {};
        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function drawProfile(id, url, config) {
            if (document.getElementById('user-' + id)) return;
            const el = document.createElement('div');
            el.className = 'photo-el';
            el.id = 'user-' + id;
            el.style.backgroundImage = `url('${url}')`;
            const s = parseInt(config.size || 120);
            el.style.width = s + 'px'; el.style.height = s + 'px';
            document.body.appendChild(el);

            let px = Math.random() * (window.innerWidth - s), py = Math.random() * (window.innerHeight - s);
            let vx = (Math.random() - 0.5) * 8, vy = (Math.random() - 0.5) * 8;

            function bounce() {
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - s) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - s) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                if (document.getElementById(el.id)) requestAnimationFrame(bounce);
            }
            bounce();
        }

        function konek() {
            const config = {
                user: document.getElementById('userIn').value,
                size: document.getElementById('sizeIn').value,
                time: document.getElementById('timeIn').value,
                giftName: document.getElementById('giftTarget').value
            };
            socket.emit('setTarget', config);
            toggleMenu();
            speak("Sistem dihubungkan ke live " + config.user);
        }

        // --- LISTENER LIVE REAL-TIME ---
        // Membaca Komentar Langsung
        socket.on('chat', (data) => {
            if(data.comment) {
                // Contoh: "Aa bilang Halo"
                speak(data.nickname + " bilang " + data.comment);
            }
        });

        // Orang Masuk (Muncul Profil)
        socket.on('memberJoin', (data) => {
            drawProfile(data.userId, data.url, data.config);
        });

        // Orang Keluar (Hapus Profil)
        socket.on('memberLeave', (data) => {
            const el = document.getElementById('user-' + data.userId);
            if(el) el.remove();
        });

        // Hadiah/Gift
        socket.on('gift', (data) => {
            speak(data.nickname + " mengirim " + data.giftName);
            // Logika ubah wujud kodok jika sesuai target
            if(data.giftName.toLowerCase() === data.config.giftName.toLowerCase()) {
                const el = document.getElementById('user-' + data.userId);
                if(el) el.style.backgroundImage = "url('https://cdn-icons-png.flaticon.com/512/3571/3571612.png')";
            }
        });
    </script>
</body>
</html>
