<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TikTok Overlay Full Event</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; color: white; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 500; background: white; padding: 15px; border-radius: 10px; }
        .hidden { display: none !important; }

        /* VISUAL UNTUK JOIN & LIKE */
        .bubble-event {
            position: absolute; width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid white; background-size: cover;
            animation: floatUp 3s forwards; z-index: 10;
        }
        .heart-icon { position: absolute; bottom: -10px; right: -10px; font-size: 30px; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { transform: translateY(80vh) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        /* KARTU CEK KHODAM */
        #card-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .kartu {
            background: rgba(0,0,0,0.9); border: 5px solid gold; border-radius: 20px;
            padding: 30px; width: 400px; text-align: center; color: white;
            box-shadow: 0 0 40px gold; display: none; animation: zoom 0.4s ease-out;
        }
    </style>
</head>
<body>

<div id="auth-container">
    <div style="background:white; color:black; padding:20px; border-radius:10px; text-align:center; width:280px;">
        <h3>Admin Login</h3>
        <input type="email" id="email" placeholder="Email" style="width:90%; padding:8px; margin-bottom:5px;">
        <input type="password" id="pass" placeholder="Password" style="width:90%; padding:8px; margin-bottom:10px;">
        <button onclick="doLogin()" style="width:100%; padding:10px; background:gold; border:none; font-weight:bold;">MASUK</button>
    </div>
</div>

<div id="menu" class="hidden">
    <input type="text" id="target" placeholder="Username TikTok">
    <button onclick="mulai()" style="background:green; color:white; border:none; padding:8px;">KONEK</button>
</div>

<div id="card-container">
    <div id="kartu" class="kartu">
        <div id="t_tipe" style="background:gold; color:black; font-weight:bold; padding:5px; border-radius:5px;">TIPE</div><br>
        <img id="t_foto" src="" style="width:100px; border-radius:50%; border:3px solid white;"><br>
        <div id="t_nama" style="font-size:20px; color:gold; margin:10px 0;">@user</div>
        <div id="t_hasil" style="font-size:28px; font-weight:bold; color:#00fff2;">HASILNYA</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // FIREBASE TETAP PAKE PUNYA LU
    const firebaseConfig = { apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo", databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const socket = io();

    function doLogin() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
        .then(() => { document.getElementById('auth-container').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); });
    }

    // --- SISTEM SUARA ---
    let antreanSuara = []; let sedangNgomong = false;
    function bicara(teks) {
        antreanSuara.push(teks);
        if (!sedangNgomong) prosesAntrean();
    }
    function prosesAntrean() {
        if (antreanSuara.length === 0) { sedangNgomong = false; return; }
        sedangNgomong = true;
        window.speechSynthesis.cancel(); // Potong yang lama biar responsif
        const msg = new SpeechSynthesisUtterance(antreanSuara.shift());
        msg.lang = 'id-ID'; msg.onend = () => prosesAntrean();
        window.speechSynthesis.speak(msg);
    }

    // VISUAL JOIN & LIKE
    socket.on('event_visual', (data) => {
        const el = document.createElement('div');
        el.className = 'bubble-event';
        el.style.backgroundImage = `url('${data.img}')`;
        el.style.left = Math.random() * 80 + '%'; // Posisi acak horizontal
        
        if (data.type === 'like') {
            el.innerHTML = '<span class="heart-icon">❤️</span>';
            el.style.borderColor = 'red';
        } else {
            el.style.borderColor = '#00fff2';
        }

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    });

    socket.on('chat_masuk', (data) => bicara(`${data.user} bilang ${data.text}`));

    socket.on('kartu_cek', (data) => {
        document.getElementById('t_tipe').innerText = data.tipe;
        document.getElementById('t_foto').src = data.img;
        document.getElementById('t_nama').innerText = data.user;
        document.getElementById('t_hasil').innerText = data.hasil;
        const k = document.getElementById('kartu');
        k.style.display = 'block';
        bicara(`${data.user}, hasil ${data.tipe} kamu adalah ${data.hasil}`);
        setTimeout(() => k.style.display = 'none', 8000);
    });

    function mulai() {
        socket.emit('setTarget', { user: document.getElementById('target').value });
        document.getElementById('menu').classList.add('hidden');
        bicara("Sistem aktif.");
    }
</script>
</body>
</html>
