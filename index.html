<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TikTok Overlay Lancar Jaya</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; color: white; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 500; background: white; padding: 15px; border-radius: 10px; border: 2px solid gold; }
        .hidden { display: none !important; }
        #card-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .kartu {
            background: rgba(0,0,0,0.9); border: 4px solid gold; border-radius: 20px;
            padding: 30px; width: 400px; text-align: center; color: white;
            box-shadow: 0 0 40px gold; display: none; animation: zoom 0.3s ease-out;
        }
        @keyframes zoom { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-container">
    <div style="background:white; color:black; padding:20px; border-radius:10px; text-align:center;">
        <h3>Login Admin</h3>
        <input type="email" id="email" placeholder="Email" style="width:90%; padding:8px; margin-bottom:5px;">
        <input type="password" id="pass" placeholder="Password" style="width:90%; padding:8px; margin-bottom:10px;">
        <button onclick="doLogin()" style="width:100%; padding:10px; background:gold; border:none; font-weight:bold;">MASUK</button>
    </div>
</div>

<div id="menu" class="hidden">
    <input type="text" id="target" placeholder="Username TikTok" style="padding:8px;">
    <button onclick="mulai()" style="padding:8px; background:green; color:white; border:none; border-radius:5px;">KONEK</button>
</div>

<div id="card-container">
    <div id="kartu" class="kartu">
        <div id="t_tipe" style="background:gold; color:black; font-weight:bold; padding:5px; border-radius:5px;">TIPE</div><br>
        <img id="t_foto" src="" style="width:100px; border-radius:50%; border:3px solid white;"><br>
        <div id="t_nama" style="font-size:20px; color:gold; margin:10px 0;">@user</div>
        <div id="t_hasil" style="font-size:28px; font-weight:bold; color:#00fff2;">HASILNYA</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // FIREBASE TETAP PAKE PUNYA LU
    const firebaseConfig = {
        apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
        databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const socket = io();

    function doLogin() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
        .then(() => { document.getElementById('auth-container').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); })
        .catch(() => alert("Gagal!"));
    }

    // --- MESIN SUARA ANALOG TIKFINITY ---
    let antreanSuara = [];
    let sedangNgomong = false;

    function bicara(teks) {
        antreanSuara.push(teks);
        if (!sedangNgomong) {
            prosesAntrean();
        }
    }

    function prosesAntrean() {
        if (antreanSuara.length === 0) {
            sedangNgomong = false;
            return;
        }

        sedangNgomong = true;
        const msg = new SpeechSynthesisUtterance(antreanSuara.shift());
        msg.lang = 'id-ID';
        msg.rate = 1.3; // Kecepatan biar gak numpuk
        
        // Paksa browser bangun
        window.speechSynthesis.resume();

        msg.onend = () => {
            prosesAntrean();
        };

        msg.onerror = () => {
            window.speechSynthesis.cancel();
            prosesAntrean();
        };

        window.speechSynthesis.speak(msg);
    }

    // TANGKAP KOMENTAR
    socket.on('chat_masuk', (data) => {
        console.log("Chat:", data.text);
        bicara(`${data.user} bilang ${data.text}`);
    });

    // TANGKAP KARTU
    socket.on('kartu_cek', (data) => {
        document.getElementById('t_tipe').innerText = data.tipe;
        document.getElementById('t_foto').src = data.img;
        document.getElementById('t_nama').innerText = data.user;
        document.getElementById('t_hasil').innerText = data.hasil;
        
        const k = document.getElementById('kartu');
        k.style.display = 'block';
        bicara(`${data.user}, hasil ${data.tipe} kamu adalah ${data.hasil}`);
        
        setTimeout(() => { k.style.display = 'none'; }, 8000);
    });

    function mulai() {
        socket.emit('setTarget', { user: document.getElementById('target').value });
        document.getElementById('menu').classList.add('hidden');
        bicara("Sistem Tikfinity Style diaktifkan. Komentar akan langsung dibaca.");
    }
</script>
</body>
</html>
