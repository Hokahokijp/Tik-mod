<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Chat Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hidden { display: none !important; }
        
        /* Foto Profil Melayang */
        .photo-el { 
            position: absolute; width: 70px; height: 70px; 
            border-radius: 50%; background-size: cover; 
            border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10; transition: transform 0.2s;
        }

        /* Bubble Chat Keren */
        .bubble {
            position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #333;
            padding: 8px 12px; border-radius: 15px; font-size: 12px;
            font-weight: bold; width: 120px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px solid #ddd; word-wrap: break-word;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-width: 8px 8px 0;
            border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent;
        }

        .nama-user {
            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; font-size: 10px;
            padding: 2px 8px; border-radius: 10px; white-space: nowrap;
        }

        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 200px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btnT" style="position:fixed; top:10px; left:10px; z-index:101; border-radius:50%; width:40px; height:40px;" onclick="toggleMenu()">⚙️</button>
    <div id="menu" class="hidden">
        <input type="text" id="userIn" placeholder="Username TikTok">
        <button onclick="konek()">KONEK BUBBLE</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let activeProfiles = {};

        function spawnProfile(data, message = null) {
            let el = activeProfiles[data.uniqueId];

            if (!el) {
                // Buat Elemen Baru jika belum ada
                el = document.createElement('div');
                el.className = 'photo-el';
                el.style.backgroundImage = `url('${data.profilePictureUrl || data.url}')`;

                const bbl = document.createElement('div');
                bbl.className = 'bubble';
                el.appendChild(bbl);

                const nm = document.createElement('div');
                nm.className = 'nama-user';
                nm.innerText = data.nickname || data.uniqueId;
                el.appendChild(nm);

                document.body.appendChild(el);
                activeProfiles[data.uniqueId] = el;

                // Logic Gerak (Sesuaikan Layar HP)
                let px = Math.random() * (window.innerWidth - 80);
                let py = Math.random() * (window.innerHeight - 120);
                let vx = (Math.random() - 0.5) * 2;
                let vy = (Math.random() - 0.5) * 2;

                function move() {
                    if (!el.parentElement) return;
                    px += vx; py += vy;
                    if (px <= 0 || px >= window.innerWidth - 80) vx *= -1;
                    if (py <= 40 || py >= window.innerHeight - 120) vy *= -1;
                    el.style.left = px + 'px'; el.style.top = py + 'px';
                    requestAnimationFrame(move);
                }
                move();
            }

            // Jika ada pesan (Chat/Gift), munculkan Bubble
            if (message) {
                const bbl = el.querySelector('.bubble');
                bbl.innerText = message;
                bbl.style.opacity = '1';
                
                // Bubble hilang otomatis setelah 4 detik
                clearTimeout(el.bubbleTimer);
                el.bubbleTimer = setTimeout(() => { bbl.style.opacity = '0'; }, 4000);
            }
        }

        socket.on('memberJoin', d => spawnProfile(d, "Hadir Bang!"));
        socket.on('chat', d => spawnProfile(d, d.comment));
        socket.on('munculFoto', d => spawnProfile(d, `Kasih ${d.giftName}! 🎁`));
        
        socket.on('memberLeave', d => {
            if (activeProfiles[d.uniqueId]) {
                activeProfiles[d.uniqueId].remove();
                delete activeProfiles[d.uniqueId];
            }
        });

        socket.on('connect', () => {
            const user = document.getElementById('userIn').value;
            if(user) socket.emit('setTarget', { user: user });
        });

        function konek() {
            const u = document.getElementById('userIn').value;
            if(!u) return;
            document.querySelectorAll('.photo-el').forEach(e => e.remove());
            activeProfiles = {};
            socket.emit('setTarget', { user: u });
            toggleMenu();
        }

        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }
    </script>
</body>
</html>
