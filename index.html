<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karakter TikTok Live Pro</title>
    <style>
        :root { --kulit: #ffdbac; --baju: #1e90ff; --celana: #2c3e50; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        .container { position: relative; width: 400px; height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }

        /* Bubble Chat */
        #bubble {
            position: absolute; top: 50px; background: white; padding: 15px;
            border-radius: 20px; font-weight: bold; border: 3px solid #1e90ff;
            max-width: 80%; text-align: center; display: none; z-index: 10;
        }

        /* Animasi Nafas (Idle) */
        #char-svg {
            width: 100%; height: 80%;
            transition: transform 0.3s ease;
            animation: nafas 4s ease-in-out infinite;
        }
        @keyframes nafas {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02) translateY(-5px); }
        }

        /* Animasi Lompat Gift */
        .jump { animation: jumpAnim 0.5s ease 3 !important; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-60px); }
        }

        .kedip { animation: kedipAnim 5s infinite; transform-origin: center; transform-box: fill-box; }
        @keyframes kedipAnim { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* Overlay Start */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input, button { padding: 15px; margin: 10px; border-radius: 10px; border: none; font-size: 16px; }
        button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <input type="text" id="targetUser" placeholder="Username TikTok Kamu">
        <button onclick="mulaiSistem()">AKTIFKAN & HUBUNGKAN</button>
    </div>

    <div id="bubble">Menunggu Data...</div>

    <div class="container">
        <svg id="char-svg" viewBox="0 0 200 350">
            <path id="kaki-l" d="M85,240 L85,320 L75,320" stroke="var(--celana)" stroke-width="18" fill="none" stroke-linecap="round" />
            <path id="kaki-r" d="M115,240 L115,320 L125,320" stroke="var(--celana)" stroke-width="18" fill="none" stroke-linecap="round" />
            <path d="M70,160 Q100,150 130,160 L135,250 Q100,260 65,250 Z" fill="var(--baju)" />
            <path id="tangan-l" d="M70,170 Q50,205 55,245" stroke="var(--kulit)" stroke-width="12" fill="none" stroke-linecap="round" />
            <path id="tangan-r" d="M130,170 Q150,205 145,245" stroke="var(--kulit)" stroke-width="12" fill="none" stroke-linecap="round" />
            <path d="M70,110 Q70,160 100,160 Q130,160 130,110 Q130,60 100,60 Q70,60 70,110" fill="var(--kulit)" />
            <g class="kedip"><circle cx="88" cy="115" r="5" fill="#111"/><circle cx="112" cy="115" r="5" fill="#111"/></g>
            <path id="mulut" d="M90,140 Q100,140 110,140" stroke="#78281f" stroke-width="3" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const mulut = document.getElementById('mulut');
        const bubble = document.getElementById('bubble');
        const charSvg = document.getElementById('char-svg');
        const synth = window.speechSynthesis;
        let intervalMulut;

        function mulaiSistem() {
            const user = document.getElementById('targetUser').value;
            if(!user) return alert("Isi username dulu!");
            socket.emit('setTarget', { user: user });
            document.getElementById('overlay').style.display = 'none';
            googleBicara("Sistem diaktifkan. Halo bosku!");
        }

        function googleBicara(teks) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(teks);
            utter.lang = 'id-ID';
            utter.rate = 1.1;
            
            utter.onstart = () => {
                intervalMulut = setInterval(() => {
                    let open = 140 + Math.random() * 15;
                    mulut.setAttribute('d', `M90,140 Q100,${open} 110,140`);
                }, 80);
            };
            
            utter.onend = () => {
                clearInterval(intervalMulut);
                mulut.setAttribute('d', "M90,140 Q100,140 110,140");
            };
            
            synth.speak(utter);
        }

        // RESPONS CHAT
        socket.on('tiktokChat', (data) => {
            bubble.innerText = `${data.user}: ${data.message}`;
            bubble.style.display = 'block';
            googleBicara(`${data.user} bilang: ${data.message}`);
            
            // Cek perintah khusus
            const msg = data.message.toLowerCase();
            if(msg.includes('duduk')) gerakDuduk(true);
            if(msg.includes('berdiri')) gerakDuduk(false);
            
            setTimeout(() => bubble.style.display = 'none', 5000);
        });

        // RESPONS GIFT
        socket.on('tiktokGift', (data) => {
            bubble.innerText = `WADIDAW! ${data.user} kasih ${data.giftName}!`;
            bubble.style.display = 'block';
            googleBicara(`Wadidaw! Terima kasih ${data.user} kado ${data.giftName}-nya!`);
            
            charSvg.classList.add('jump');
            setTimeout(() => charSvg.classList.remove('jump'), 2000);
        });

        // RESPONS JOIN
        socket.on('tiktokJoin', (data) => {
            googleBicara(`Selamat datang ${data.user}!`);
        });

        function gerakDuduk(isDuduk) {
            if(isDuduk) {
                document.getElementById('kaki-l').setAttribute('d', "M85,240 L85,285 L130,285");
                document.getElementById('kaki-r').setAttribute('d', "M115,240 L115,285 L160,285");
                charSvg.style.transform = "translateY(40px)";
            } else {
                document.getElementById('kaki-l').setAttribute('d', "M85,240 L85,320 L75,320");
                document.getElementById('kaki-r').setAttribute('d', "M115,240 L115,320 L125,320");
                charSvg.style.transform = "translateY(0)";
            }
        }
    </script>
</body>
</html>
