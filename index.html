<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble & Square Photo Control</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f0f1a;
            overflow: hidden;
            font-family: sans-serif;
            position: fixed;
            width: 100%;
        }

        /* --- BINGKAI TETAP DI ATAS --- */
        #leaderboard-frame {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 250px;
            z-index: 100;
            pointer-events: none;
        }

        .bingkai-slot {
            position: absolute;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            /* Gambar Background Bingkai dari Link Abang */
            background-image: url('https://i.ibb.co.com/Xr60g95B/download-5.jpg');
        }

        .bingkai-slot[data-rank="1"] { top: 0; left: calc(50% - 55px); width: 110px; height: 110px; border-color: #ff00ff; }
        .bingkai-slot[data-rank="2"] { top: 30px; left: calc(50% + 80px); width: 85px; height: 85px; border-color: #00ffff; }
        .bingkai-slot[data-rank="3"] { top: 30px; left: calc(50% - 165px); width: 85px; height: 85px; border-color: #ff4500; }
        .bingkai-slot[data-rank="4"] { top: 130px; left: calc(50% + 70px); width: 75px; height: 75px; border-color: #00ff00; }
        .bingkai-slot[data-rank="5"] { top: 145px; left: calc(50% - 40px); width: 80px; height: 80px; border-color: #ffff00; }
        .bingkai-slot[data-rank="6"] { top: 130px; left: calc(50% - 145px); width: 75px; height: 75px; border-color: #ff0000; }

        /* GARIS PEMBATAS TENGAH */
        #mid-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, transparent);
            box-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }

        /* FOTO MELAYANG */
        .photo-el {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            pointer-events: none;
            z-index: 50;
            transition: border-radius 0.3s ease, opacity 0.5s ease;
        }

        #settings-panel {
            position: fixed; top: 15px; right: 15px; width: 200px;
            background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 12px;
            color: white; z-index: 1000; border: 1px solid rgba(255,255,255,0.2);
        }

        h3 { margin: 0 0 10px 0; font-size: 13px; color: #00ffcc; text-align: center; }
        label { font-size: 11px; display: block; margin-bottom: 4px; color: #bbb; }
        input[type="range"], select { width: 100%; margin-bottom: 12px; background: #333; color: white; border: none; padding: 5px; border-radius: 4px; }
        .btn-hide { width: 100%; padding: 8px; background: #ff4d4d; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mid-line"></div>

    <div id="leaderboard-frame">
        <div class="bingkai-slot" data-rank="1"></div>
        <div class="bingkai-slot" data-rank="2"></div>
        <div class="bingkai-slot" data-rank="3"></div>
        <div class="bingkai-slot" data-rank="4"></div>
        <div class="bingkai-slot" data-rank="5"></div>
        <div class="bingkai-slot" data-rank="6"></div>
    </div>

    <div id="settings-panel">
        <h3>⚙️ PENGATURAN</h3>
        <label>Bentuk Foto</label>
        <select id="shapeCtrl">
            <option value="50%">Bulat</option>
            <option value="0%">Kotak</option>
        </select>
        <label>Ukuran</label>
        <input type="range" id="sizeCtrl" min="40" max="150" value="70">
        <label>Kecepatan</label>
        <input type="range" id="speedCtrl" min="1" max="10" value="3">
        <label>Waktu Hilang</label>
        <input type="range" id="timerCtrl" min="1" max="20" value="10">
        <button class="btn-hide">Tutup</button>
    </div>

    <script>
        let photos = [];
        
        function createPhoto() {
            const size = parseInt(document.getElementById('sizeCtrl').value);
            const winH = window.innerHeight;
            
            const p = {
                id: Date.now() + Math.random(),
                el: document.createElement('div'),
                x: Math.random() * (window.innerWidth - size),
                // SPAWN DI BAWAH GARIS TENGAH (55% layar ke bawah)
                y: (winH * 0.55) + (Math.random() * (winH * 0.3)), 
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2,
                spawnTime: Date.now()
            };

            p.el.className = 'photo-el';
            p.el.style.backgroundImage = `url('https://picsum.photos/200?random=${p.id}')`;
            document.body.appendChild(p.el);
            photos.push(p);
        }

        setInterval(() => { if (photos.length < 15) createPhoto(); }, 2000);

        function animate() {
            const size = parseInt(document.getElementById('sizeCtrl').value);
            const speed = parseFloat(document.getElementById('speedCtrl').value);
            const shape = document.getElementById('shapeCtrl').value;
            const lifeSpan = parseInt(document.getElementById('timerCtrl').value) * 1000;
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const winH_Mid = winH / 2; // GARIS TENGAH

            for (let i = photos.length - 1; i >= 0; i--) {
                let p = photos[i];
                if (Date.now() - p.spawnTime > lifeSpan) {
                    p.el.remove();
                    photos.splice(i, 1);
                    continue;
                }

                p.el.style.width = size + 'px';
                p.el.style.height = size + 'px';
                p.el.style.borderRadius = shape;

                p.x += p.dx * speed;
                p.y += p.dy * speed;

                // PANTULAN HORIZONTAL
                if (p.x + size > winW || p.x < 0) p.dx *= -1;

                // --- PANTULAN VERTIKAL (HANYA DI BAWAH GARIS) ---
                // Jika mau naik ke atas garis tengah, pantulkan balik ke bawah
                if (p.y < winH_Mid) { 
                    p.y = winH_Mid; 
                    p.dy *= -1; 
                }
                // Jika mentok bawah layar
                if (p.y + size > winH) { 
                    p.y = winH - size; 
                    p.dy *= -1; 
                }

                p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
