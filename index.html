<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Overlay Premium v2.7</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        #auth-container { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; width: 280px; text-align: center; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; width: 240px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; max-height: 85vh; }
        .hidden { display: none !important; }
        
        @keyframes petirAnim {
            0% { box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff00de; border-color: #fff; }
            33% { box-shadow: 0 0 15px #00f6ff, 0 0 25px #00f6ff, 0 0 40px #00f6ff; border-color: #00f6ff; }
            66% { box-shadow: 0 0 10px #ffff00, 0 0 30px #ffff00, 0 0 50px #ffff00; border-color: #ffff00; }
            100% { box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff00de; border-color: #fff; }
        }

        .photo-el { 
            position: absolute; 
            background-size: cover; 
            background-position: center; 
            border: 4px solid white; 
            border-radius: 50%; 
            pointer-events: none; 
            transition: opacity 0.5s;
            animation: petirAnim 0.3s infinite;
        }
        
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        label { font-size: 11px; font-weight: bold; margin-top: 8px; display: block; color: #444; }
        button { cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
        .switch-box { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-top: 10px; background: #f0f0f0; padding: 6px; border-radius: 5px; }
        .checklist-group { text-align: left; background: #f9f9f9; padding: 8px; border-radius: 5px; margin-top: 5px; border: 1px solid #eee; }
        .check-item { display: flex; align-items: center; font-size: 11px; margin-bottom: 4px; }
        .check-item input { width: auto; margin-right: 8px; margin-top: 0; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="box" id="login-form">
            <h3>Masuk Akun</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()" style="background:#007bff; color:white;">MASUK</button>
            <p style="font-size:12px">Belum punya akun? <a href="#" onclick="toggleAuth(true)">Daftar Disini</a></p>
        </div>

        <div class="box hidden" id="register-form">
            <h3>Daftar Baru</h3>
            <input type="text" id="r-tiktok" placeholder="Username TikTok">
            <input type="email" id="r-email" placeholder="Email Baru">
            <input type="password" id="r-pass" placeholder="Password Baru">
            <button onclick="register()" style="background:#28a745; color:white;">DAFTAR SEKARANG</button>
            <p style="font-size:12px"><a href="#" onclick="toggleAuth(false)">Kembali Login</a></p>
        </div>
    </div>

    <button id="btnT" class="hidden" style="position:fixed; top:10px; left:10px; z-index:101; width:45px; height:45px; border-radius:50%; background:white; font-size:20px; border:2px solid #ddd;" onclick="toggleMenu()">⚙️</button>
    
    <div id="menu" class="hidden">
        <h4 style="margin:0">⚙️ Pengaturan</h4>
        <label>TikTok Target:</label>
        <input type="text" id="userIn">
        <label>Target Gift:</label>
        <input type="text" id="giftTarget" value="Rose">
        <label>Ubah Jadi (Ceklis Semua):</label>
        <div class="checklist-group">
            <div class="check-item"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/3571/3571612.png"> 🐸 Kodok</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/whq7Qv3z/download-removebg-preview.png"> 🐷 Babi</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://cdn-icons-png.flaticon.com/512/616/616408.png"> 🐱 Kucing</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/hJdZgZXb/download-1-removebg-preview.png"> 🦎 Ciktak</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/NdrDQk22/images-removebg-preview.png"> 🦍 Orang Utan</div>
            <div class="check-item"><input type="checkbox" class="m-check" value="https://i.ibb.co.com/zVD6tDFV/download-2-removebg-preview.png"> 🐟 Ikan Mas</div>
        </div>
        <label>Ukuran & Detik:</label>
        <div style="display:flex; gap:5px;">
            <input type="number" id="sizeIn" value="150">
            <input type="number" id="timeIn" value="10">
        </div>
        <div class="switch-box">
            <span>🔊 Suara Komen & Gift</span>
            <input type="checkbox" id="ttsOn" checked>
        </div>
        <button onclick="konek()" style="background:#28a745; color:white;">TERAPKAN</button>
        <button onclick="auth.signOut(); location.reload();" style="color:red; font-size:10px; background:none;">LOGOUT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
            authDomain: "sos-pro-cd66d.firebaseapp.com",
            databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
            projectId: "sos-pro-cd66d",
            storageBucket: "sos-pro-cd66d.appspot.com",
            messagingSenderId: "879343847954",
            appId: "1:879343847954:web:cc0b959202055fc252e6cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const socket = io();

        function toggleAuth(showReg) {
            document.getElementById('login-form').classList.toggle('hidden', showReg);
            document.getElementById('register-form').classList.toggle('hidden', !showReg);
        }

        function register() {
            const t = document.getElementById('r-tiktok').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            if(!t || !e || !p) return alert("Isi semua data!");
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                db.ref('users/' + res.user.uid).set({ email: e, tiktokUser: t, status: 'free' });
                alert("Daftar Berhasil! Silakan Login.");
                toggleAuth(false);
            }).catch(err => alert(err.message));
        }

        function login() {
            const e = document.getElementById('l-email').value;
            const p = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Gagal: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('btnT').classList.remove('hidden');
                    if(snap.val()) document.getElementById('userIn').value = snap.val().tiktokUser;
                });
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
            }
        });

        function speak(text) {
            if (!document.getElementById('ttsOn').checked) return;
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'id-ID';
            window.speechSynthesis.speak(ut);
        }

        function toggleMenu() { document.getElementById('menu').classList.toggle('hidden'); }

        function konek() {
            const morphs = [];
            document.querySelectorAll('.m-check:checked').forEach(c => morphs.push(c.value));
            const config = {
                user: document.getElementById('userIn').value,
                size: document.getElementById('sizeIn').value,
                time: document.getElementById('timeIn').value,
                giftName: document.getElementById('giftTarget').value,
                morphs: morphs
            };
            socket.emit('setTarget', config);
            toggleMenu();
            speak("Sistem aktif untuk " + config.user);
        }

        socket.on('munculFoto', (data) => {
            const el = document.createElement('div');
            el.className = 'photo-el';
            let img = data.url;
            if (data.giftName && data.giftName.toLowerCase() === data.config.giftName.toLowerCase()) {
                if (data.config.morphs.length > 0) img = data.config.morphs[Math.floor(Math.random() * data.config.morphs.length)];
            }
            el.style.backgroundImage = `url('${img}')`;
            const s = parseInt(data.config.size);
            el.style.width = s + 'px'; el.style.height = s + 'px';
            document.body.appendChild(el);
            if (data.giftName) speak(data.nickname + " kasih " + data.giftName);

            let px = Math.random() * (window.innerWidth - s), py = Math.random() * (window.innerHeight - s);
            let vx = (Math.random() - 0.5) * 10, vy = (Math.random() - 0.5) * 10;
            function move() {
                px += vx; py += vy;
                if (px <= 0 || px >= window.innerWidth - s) vx *= -1;
                if (py <= 0 || py >= window.innerHeight - s) vy *= -1;
                el.style.left = px + 'px'; el.style.top = py + 'px';
                if (el.parentNode) requestAnimationFrame(move);
            }
            move();
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, data.config.time * 1000);
        });

        socket.on('chat', (data) => {
            if(data.comment) speak(data.nickname + " berkata " + data.comment);
        });
    </script>
</body>
</html>
