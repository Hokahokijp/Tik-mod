<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Cek Otomatis</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #menu { position: fixed; top: 10px; left: 10px; z-index: 100; background: white; padding: 15px; border-radius: 10px; }
        .photo-el { 
            position: absolute; border-radius: 50%; background-size: cover; 
            border: 3px solid white; box-shadow: 0 0 15px #00fff2;
        }
        .name-tag {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            color: white; font-weight: bold; font-size: 12px; white-space: nowrap; text-shadow: 2px 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="menu">
        <input type="text" id="userIn" placeholder="Username TikTok">
        <button onclick="konek()">Mulai Live</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let activeProfiles = {};

        function speak(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'id-ID';
            window.speechSynthesis.speak(ut);
        }

        function spawnProfile(data) {
            if (activeProfiles[data.uniqueId]) return;

            const el = document.createElement('div');
            el.className = 'photo-el';
            el.style.backgroundImage = `url('${data.profilePictureUrl}')`;
            el.style.width = '80px'; el.style.height = '80px';

            const nameTag = document.createElement('div');
            nameTag.className = 'name-tag';
            nameTag.innerText = data.nickname;
            el.appendChild(nameTag);

            document.body.appendChild(el);
            activeProfiles[data.uniqueId] = el;

            let posX = Math.random() * window.innerWidth;
            let posY = Math.random() * window.innerHeight;
            let velX = 2; let velY = 2;

            function move() {
                if(!el.parentElement) return;
                posX += velX; posY += velY;
                if(posX <= 0 || posX >= window.innerWidth - 80) velX *= -1;
                if(posY <= 0 || posY >= window.innerHeight - 80) velY *= -1;
                el.style.left = posX + 'px'; el.style.top = posY + 'px';
                requestAnimationFrame(move);
            }
            move();
        }

        function konek() {
            const user = document.getElementById('userIn').value;
            socket.emit('setTarget', { user });
            document.getElementById('menu').style.display = 'none';
        }

        socket.on('autoTTS', (text) => speak(text));
        socket.on('munculFoto', (data) => spawnProfile(data));
        socket.on('chat', (data) => {
            spawnProfile(data);
            speak(`${data.nickname} berkata ${data.comment}`);
        });
        socket.on('memberJoin', (data) => {
            spawnProfile(data);
            speak(`Selamat datang ${data.nickname}`);
        });
    </script>
</body>
</html>
