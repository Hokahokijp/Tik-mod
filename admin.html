<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard PRO - TikTok Bot</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .header { background: #111; color: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-item { background: white; padding: 20px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #1a73e8; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f8f9fa; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .status-on { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-off { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .badge-premium { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 200px; }
        button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-act { color: white; font-size: 11px; }
        .btn-delete { background: #ff4d4d; color: white; padding: 5px 10px; }
        
        .online-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0">Admin Control Panel 👑</h1>
            <p style="margin:5px 0 0 0; opacity: 0.8;">Manajemen Lisensi & Monitoring User</p>
        </div>
        <div id="clock" style="font-weight: bold; font-size: 18px;"></div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div style="color: #888; font-size: 12px;">TOTAL PENGGUNA</div>
            <div id="total-users" style="font-size: 28px; font-weight: bold;">0</div>
        </div>
        <div class="stat-item" style="border-top-color: #28a745;">
            <div style="color: #888; font-size: 12px;">USER PREMIUM</div>
            <div id="total-premium" style="font-size: 28px; font-weight: bold; color: #28a745;">0</div>
        </div>
        <div class="stat-item" style="border-top-color: #ffc107;">
            <div style="color: #888; font-size: 12px;">SEDANG ONLINE</div>
            <div id="total-online" style="font-size: 28px; font-weight: bold; color: #ffc107;">0</div>
        </div>
    </div>

    <div class="card">
        <h3>Aktivasi Lisensi Email</h3>
        <div class="input-group">
            <input type="email" id="targetEmail" placeholder="Masukkan Email User Yang Akan Diaktifkan...">
        </div>
        <div class="input-group">
            <button class="btn-act" onclick="updateUser(999, 'premium', '1 Hari')" style="background:#6c757d">Harian (11rb)</button>
            <button class="btn-act" onclick="updateUser(999, 'premium', '1 Minggu')" style="background:#17a2b8">Mingguan (65rb)</button>
            <button class="btn-act" onclick="updateUser(999, 'premium', '2 Minggu')" style="background:#007bff">2 Minggu (50rb)</button>
            <button class="btn-act" onclick="updateUser(999, 'premium', '1 Bulan')" style="background:#28a745">Bulanan (100rb)</button>
            <button class="btn-act" onclick="updateUser(999999, 'premium', 'Selamanya')" style="background:#6f42c1">Selamanya (18.9rb)</button>
            <button class="btn-act" onclick="updateUser(10, 'free', '-')" style="background:#333">Reset ke Free</button>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h3>Data Monitoring User</h3>
        <table>
            <thead>
                <tr>
                    <th>User / Email</th>
                    <th>Status Akun</th>
                    <th>Paket</th>
                    <th>Koneksi</th>
                    <th>Last Active (Jam/Tgl)</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="user-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Konfigurasi Firebase Aa
    const firebaseConfig = {
        apiKey: "AIzaSyAU18VAqfQG4XeCxqbWVZWe6zxh9wnywmo",
        authDomain: "sos-pro-cd66d.firebaseapp.com",
        databaseURL: "https://sos-pro-cd66d-default-rtdb.firebaseio.com",
        projectId: "sos-pro-cd66d",
        storageBucket: "sos-pro-cd66d.appspot.com",
        messagingSenderId: "879343847954",
        appId: "1:879343847954:web:cc0b959202055fc252e6cb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Jam Realtime
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('id-ID');
    }, 1000);

    // Ambil Data Realtime
    db.ref('users').on('value', snap => {
        const tableBody = document.getElementById('user-table-body');
        tableBody.innerHTML = ""; 
        let total = 0, premium = 0, online = 0;

        snap.forEach(child => {
            const user = child.val();
            const key = child.key;
            total++;
            
            if(user.status === 'premium') premium++;
            if(user.isOnline) online++;

            // Format baris tabel
            let row = `<tr>
                <td>
                    <div style="font-weight:bold">${user.tiktokUser || 'No Name'}</div>
                    <div style="font-size:11px; color:#888">${user.email}</div>
                </td>
                <td><span class="badge ${user.status === 'premium' ? 'badge-premium' : ''}">${user.status.toUpperCase()}</span></td>
                <td><b>${user.paket || '-'}</b></td>
                <td>
                    <span class="badge ${user.isOnline ? 'status-on' : 'status-off'}">
                        ${user.isOnline ? '<span class="online-dot"></span>Online' : 'Offline'}
                    </span>
                </td>
                <td style="font-size:11px; color:#555">${user.lastActive || 'Belum Pernah'}</td>
                <td>
                    <button class="btn-delete" onclick="hapusUser('${key}')">Hapus</button>
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });

        document.getElementById('total-users').innerText = total;
        document.getElementById('total-premium').innerText = premium;
        document.getElementById('total-online').innerText = online;
    });

    // Fungsi Aktifkan Paket
    function updateUser(limitBaru, status, paket) {
        const email = document.getElementById('targetEmail').value;
        if(!email) return alert("Pilih email user dulu bos!");

        db.ref('users').orderByChild('email').equalTo(email).once('value', snap => {
            if(!snap.exists()) return alert("Email ini belum terdaftar di aplikasi!");
            
            snap.forEach(child => {
                db.ref('users/' + child.key).update({
                    limit: limitBaru,
                    status: status,
                    paket: paket,
                    activationDate: new Date().toLocaleDateString('id-ID')
                });
                alert("SUKSES! " + email + " sekarang paket " + paket);
            });
        });
    }

    // Fungsi Hapus
    function hapusUser(key) {
        if(confirm("User ini akan dihapus permanen, lanjut?")) {
            db.ref('users/' + key).remove();
        }
    }
</script>

</body>
</html>
